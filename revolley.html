<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Revolley">
<meta name="theme-color" content="#0A0E1A">
<title>🏐 Revolley</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0A0E1A;color:#F1F5F9;font-family:'Helvetica Neue',Arial,sans-serif;overflow:hidden}
body{padding-top:env(safe-area-inset-top)}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOP BAR */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#05080f;border-bottom:2px solid var(--srv-color,#F97316);flex-shrink:0;gap:6px;position:relative;z-index:7000}
#topbar .title{font-weight:700;font-size:15px}
#topbar .title span{color:#F97316}

/* SIDE MENU */
#menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:8000;display:none;opacity:0;transition:opacity 0.2s}
#menu-overlay.open{display:block;opacity:1}
#side-menu{position:fixed;left:0;top:0;bottom:0;width:80%;max-width:320px;background:#0d1322;z-index:8001;transform:translateX(-100%);transition:transform 0.25s ease;display:flex;flex-direction:column;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
#side-menu.open{transform:translateX(0)}
.menu-header{padding:20px 16px 12px;border-bottom:1px solid #2A3A5C;flex-shrink:0}
.menu-logo{font-size:22px;font-weight:900;color:#F97316;margin-bottom:2px}
.menu-logo span{color:#F1F5F9}
.menu-sub{font-size:10px;color:#56627A}
.menu-section{padding:8px 0}
.menu-section-label{font-size:9px;font-weight:700;color:#56627A;letter-spacing:1px;padding:6px 16px 4px;text-transform:uppercase}
.menu-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background 0.1s;border:none;background:transparent;width:100%;text-align:left;color:#F1F5F9}
.menu-item:active{background:#1A2540}
.menu-item .menu-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.menu-item .menu-text{font-size:13px;font-weight:600}
.menu-item .menu-desc{font-size:10px;color:#56627A;margin-top:1px}
.menu-divider{height:1px;background:#1A2540;margin:4px 0}
.menu-badge{background:#F97316;color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:auto}
#srv-badge{display:flex;align-items:center;gap:6px;background:rgba(249,115,22,0.13);border-radius:20px;padding:4px 12px;border:1px solid var(--srv-color,#F97316)}
#srv-badge b{font-size:12px}
#topbar .btns{display:flex;gap:5px}
.tbtn{background:#1A2540;border:1px solid #2A3A5C;color:#F1F5F9;border-radius:8px;padding:4px 8px;font-size:10px;cursor:pointer}

/* MAIN LAYOUT */
#main{display:flex;flex:1;overflow:hidden;gap:0;position:relative}

/* スマホ: 縦向き2カラム（左=コート、右=アクション/タブ） */
#left{
  flex:0 0 52%;min-width:0;padding:6px;
  overflow-y:auto;display:flex;flex-direction:column;gap:4px;
}
#right{
  flex:1 1 48%;min-width:0;padding:6px;
  overflow-y:auto;display:flex;flex-direction:column;gap:4px;
}

/* タブレット: 左をより広く */
@media(min-width:768px){
  #left{flex:0 0 55%;}
  #right{flex:1 1 45%;}
}

/* アクションパネル: 右カラム内にインライン表示 */
#action-panel{
  background:#12182A;
  border:2px solid #F97316;
  border-radius:12px;
  padding:10px 10px 12px;
  display:none;
  flex-direction:column;
  gap:6px;
}
#action-panel.open{
  display:flex;
}
/* スワイプパネル: 右カラム内にインライン表示 */
#swipe-panel{
  border-radius:12px;
  overflow:hidden;
  display:none;
}
#swipe-panel.open{
  display:block;
}
/* レセプション評価 */
#reception-grade{
  background:#12182A;border:2px solid #22C55E;
  border-radius:12px;padding:12px;
  display:none;
}
#reception-grade.open{
  display:block;
}

/* タブレット対応 */
@media(min-width:768px){
  #app{max-width:1200px;margin:0 auto}
  #topbar{padding:10px 20px}
  #left{max-width:560px;padding:12px}
  #right{padding:12px}
  .court-cell .num{font-size:22px}
  .court-cell .pname{font-size:9px}
  .sp-zone-cell{font-size:22px}
  .sp-slot-cell{font-size:16px;height:60px}
  #tabs .tab-btn{font-size:12px;padding:8px 4px}
  .kpi-val{font-size:20px}
}
@media(min-width:1024px){
  #left{max-width:640px}
  .score-num{font-size:64px}
}

/* SCORE */
#scoreboard{background:linear-gradient(135deg,#0F1E3A,#1A2540);border-radius:12px;padding:8px 14px;border:2px solid var(--srv-color,#F97316);display:flex;align-items:center;justify-content:space-between}
.team-score{text-align:center;flex:1}
.team-name{font-size:11px;font-weight:700;background:transparent;border:none;color:inherit;text-align:center;width:100%}
.score-num{font-size:38px;font-weight:900;line-height:1}
.score-mid{text-align:center;min-width:60px}
.score-sep{color:#56627A;font-size:14px}
.score-set{color:#94A3B8;font-size:9px}
.score-lbl{font-size:8px;font-weight:700}
.srv-arrow{font-size:9px;font-weight:700}
.set-btns{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;justify-content:center}
.setbtn{border:none;border-radius:10px;color:#fff;font-size:9px;padding:2px 7px;cursor:pointer;font-weight:700}

/* SERVE BANNER */
#serve-banner{background:rgba(249,115,22,0.13);border:2px solid var(--srv-color,#F97316);border-radius:12px;padding:10px 12px}
.sb-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sb-title{font-weight:800;font-size:13px}
.sb-zone-badge{background:rgba(249,115,22,0.3);border-radius:8px;padding:4px 12px;text-align:center;border:1px solid var(--srv-color,#F97316)}
.sb-zone-lbl{color:#56627A;font-size:8px}
.sb-zone-num{font-weight:900;font-size:18px;line-height:1}
.ms-btn-big{width:100%;margin-bottom:8px;padding:10px;border-radius:10px;cursor:pointer;background:rgba(239,68,68,0.15);border:2px solid #EF4444;color:#EF4444;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px}
.zone-grid{background:#0B1A0B;border-radius:8px;padding:6px}
.zone-row{display:flex;gap:3px;margin-bottom:3px}
.zone-row:last-child{margin-bottom:0}
.zbtn{flex:1;aspect-ratio:1.4;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:2px solid var(--srv-color,#F97316);background:rgba(249,115,22,0.1)}
.zbtn span{border:2px solid #1a1208;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:rgba(232,151,58,0.9);color:#1a1208;font-weight:800;font-size:16px}
.serve-results{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.srv-res-btn{padding:10px 4px;border-radius:10px;cursor:pointer;font-weight:800;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:2px;border:2px solid}
.srv-res-btn small{font-size:8px;color:#94A3B8;font-weight:400;text-align:center}
.other-btn{width:100%;background:transparent;border:1px solid #2A3A5C;border-radius:8px;color:#94A3B8;padding:5px;font-size:10px;cursor:pointer}

/* SET END */
#set-end{background:rgba(234,179,8,0.15);border:2px solid #EAB308;border-radius:12px;padding:12px 16px;text-align:center}
#set-end h2{color:#EAB308;font-size:16px;margin-bottom:8px}
.next-set-btn{background:#EAB308;border:none;border-radius:10px;color:#1a1208;font-weight:700;font-size:13px;padding:8px 20px;cursor:pointer}

/* HINT BAR */
#hint{background:#12182A;border-radius:10px;padding:6px 10px;border:1px solid #2A3A5C;display:flex;flex-direction:column;gap:4px}
.hint-steps{display:flex;gap:4px;align-items:center}
.hint-step{display:flex;align-items:center;gap:3px;font-size:10px}
.hint-step-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.hint-step-lbl{font-size:10px;font-weight:600}
.hint-step-arrow{color:#56627A;font-size:10px;margin:0 2px}
.hint-main{display:flex;align-items:center;gap:8px}
#hint-text{flex:1;font-weight:700;font-size:12px}
.cancel-btn{background:rgba(239,68,68,0.15);border:1px solid #EF4444;color:#EF4444;font-size:11px;border-radius:8px;padding:4px 10px;cursor:pointer;white-space:nowrap}

/* COURT */
#court-wrap{position:relative;background:#12182A;border-radius:14px;padding:10px 10px 12px;border:1px solid #2A3A5C}
.court-team-label{text-align:center;font-size:9px;font-weight:700;margin:4px 0}
.court-row{display:flex;gap:5px;margin-bottom:5px}
.court-row:last-child{margin-bottom:0}
.court-cell{flex:1;padding:3px 2px;border-radius:7px;cursor:pointer;text-align:center;line-height:1.1;border:2px solid #2A3A5C;background:#1A2540;transition:all 0.12s;position:relative}
.court-cell .pos-lbl{color:#56627A;font-size:7px}
.court-cell .num{font-weight:900;font-size:14px;line-height:1}
.court-cell .pname{font-size:7px;color:#94A3B8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.court-cell.empty{cursor:default}
.court-cell.actor{box-shadow:0 0 10px rgba(249,115,22,0.55)}
.court-cell.opp-sel{box-shadow:0 0 10px rgba(59,130,246,0.55)}
.court-cell.server-pos::after{content:'★S';position:absolute;top:1px;left:2px;font-size:6px;color:rgba(249,115,22,0.7)}
.net{position:relative;margin:8px 0;height:18px;background:repeating-linear-gradient(90deg,#1a3a3a 0 3px,#0c1f1f 3px 6px);border:2px solid #cfd6dd;border-left:none;border-right:none}
.net::before,.net::after{content:'';position:absolute;top:-5px;width:7px;height:30px;background:#3B82F6;border-radius:3px}
.net::before{left:-6px}.net::after{right:-6px}
.net-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.net-label span{background:#1A2540;color:#94A3B8;font-size:8px;font-weight:700;padding:1px 8px;border-radius:8px;letter-spacing:1px}

/* SLOT STRIP */
#slot-strip{background:#12182A;border-radius:10px;padding:8px 10px;border:2px solid #F97316}
#slot-strip .lbl{font-size:10px;font-weight:600;margin-bottom:5px}
/* ── COMBINED SWIPE PANEL (slot→zone in one gesture) ── */
#swipe-panel{background:#0d1420;border-radius:12px;padding:8px;touch-action:none;user-select:none;position:relative}
/* SLOT ROW */
.sp-slot-row{display:flex;gap:0;border-radius:8px;overflow:hidden;height:56px;margin-bottom:8px;position:relative}
.sp-slot-cell{flex:1;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#1a1208;background:rgba(232,151,58,0.88);border-right:1px solid rgba(0,0,0,0.12);position:relative;transition:background 0.06s}
.sp-slot-cell:last-child{border-right:none}
.sp-slot-cell.zero{background:#4a8c2a;color:#fff}
.sp-slot-cell.sp-hover{background:#F97316;color:#fff}
.sp-slot-cell.sp-sel{background:#F97316;color:#fff;box-shadow:inset 0 0 0 3px #fff}
.sp-slot-cell.sp-sel::after{content:'✓';position:absolute;top:1px;right:2px;font-size:8px;color:rgba(255,255,255,0.8)}
/* ZONE GRID */
.sp-zone-net{text-align:center;color:#56627A;font-size:8px;margin-bottom:3px}
.sp-zone-row{display:flex;gap:3px;margin-bottom:3px}
.sp-zone-row:last-child{margin-bottom:0}
.sp-zone-cell{flex:1;aspect-ratio:1.2;border-radius:7px;display:flex;align-items:center;justify-content:center;border:2px solid #22C55E;background:rgba(232,151,58,0.88);font-weight:800;font-size:22px;color:#1a1208;transition:background 0.06s,transform 0.06s;position:relative}
.sp-zone-cell span{border:2px solid #1a1208;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;pointer-events:none;font-size:20px;transition:border-color 0.06s,color 0.06s}
.sp-zone-cell.sp-hover{background:rgba(34,197,94,0.45);border-color:#22C55E;transform:scale(1.06)}
.sp-zone-cell.sp-hover span{border-color:#fff;color:#1a1208}
.sp-zone-cell.sp-sel{background:#22C55E;color:#fff;border-color:#fff}
.sp-zone-cell.sp-sel span{border-color:#fff;color:#fff}
/* finger trail indicator */
.sp-trail{position:absolute;pointer-events:none;width:22px;height:22px;border-radius:50%;background:rgba(249,115,22,0.55);border:2px solid #fff;transform:translate(-50%,-50%);display:none;z-index:10}
/* hint */
.sp-hint{text-align:center;font-size:9px;color:#56627A;margin-top:5px}
.sp-lbl{font-size:10px;font-weight:700;margin-bottom:6px}
/* compat stubs */
.swipe-slot-track,.swipe-zone-grid,.slot-hint{}
.slotbtn,.slot-row,.az-grid,.az-row,.azbtn{}

/* ACTION ZONE */
#action-zone{background:#12182A;border-radius:10px;padding:8px 10px;border:2px solid #22C55E}
#action-zone .lbl{font-size:10px;font-weight:600;color:#22C55E;margin-bottom:5px}
.az-grid{background:#0B1A0B;border-radius:8px;padding:8px}
.az-row{display:flex;gap:4px;margin-bottom:4px}
.az-row:last-child{margin-bottom:0}
.azbtn{flex:1;aspect-ratio:1.4;border-radius:8px;font-weight:800;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:2px solid #22C55E;background:rgba(232,151,58,0.92)}
.azbtn span{border:2px solid #1a1208;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center}
.azbtn.sel{background:#22C55E;color:#fff}
.azbtn.sel span{border-color:#fff;color:#fff}

/* OPP HINT */
#opp-hint{
  background:#12182A;border:2px solid #3B82F6;
  border-radius:12px;padding:10px 12px;
  display:none;
}
#opp-hint p{color:#3B82F6;font-size:12px;font-weight:700;text-align:center}

/* SA OPP PICKER */
#sa-opp{
  background:#12182A;border:2px solid #22C55E;
  border-radius:12px;padding:12px 12px 14px;
  display:none;
}
#sa-opp.open{display:block;}
#sa-opp .lbl{color:#22C55E;font-weight:700;font-size:13px;margin-bottom:6px}
#sa-opp .sub{color:#94A3B8;font-size:10px;margin-bottom:8px}
.opp-grid{display:flex;flex-wrap:wrap;gap:5px}
.opp-player-btn{padding:7px 10px;border-radius:9px;cursor:pointer;border:2px solid #22C55E;background:rgba(34,197,94,0.1);color:#22C55E;font-weight:700;text-align:center;min-width:48px}
.opp-player-btn .pn{font-size:15px}.opp-player-btn .pnm{font-size:8px;color:#94A3B8}
.skip-btn{padding:5px 10px;border-radius:7px;border:1px solid #2A3A5C;background:#1A2540;color:#94A3B8;font-size:10px;cursor:pointer}

/* BENCH */
#bench{background:#12182A;border-radius:10px;padding:6px 10px;border:1px solid #2A3A5C;display:flex;gap:12px}
.bench-team{flex:1}
.bench-lbl{color:#56627A;font-size:9px;margin-bottom:3px}
.bench-nums{display:flex;flex-wrap:wrap;gap:3px}
.bench-num{padding:3px 6px;border-radius:5px;border:1px solid #2A3A5C;color:#56627A;font-size:11px}

/* TOAST */
#toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#22C55E;color:#fff;font-size:11px;font-weight:700;padding:6px 16px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:9999}
#toast.show{opacity:1}

/* popup styles removed */

/* TABS */
#tabs{display:flex;background:#12182A;border-radius:12px;padding:3px;border:1px solid #2A3A5C;gap:2px;flex-shrink:0}
.tab-btn{flex:1;padding:6px 2px;border-radius:9px;border:none;background:transparent;color:#94A3B8;font-size:10px;cursor:pointer;font-weight:400}
.tab-btn.active{background:#1A2540;color:#F97316;font-weight:700}

/* LOG */
#log-list{max-height:calc(100vh - 350px);overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.log-entry{font-size:10px;padding:4px 8px;background:#1A2540;border-radius:6px;display:flex;justify-content:space-between;align-items:center}
.log-entry.teamA{border-left:3px solid #F97316}
.log-entry.teamB{border-left:3px solid #3B82F6}
.log-pts{font-weight:700;font-size:10px}

/* RUNNING SCORE */
#running-score{overflow-y:auto;max-height:300px}
.rs-header{display:flex;gap:4px;margin-bottom:4px;position:sticky;top:0;background:#12182A;z-index:2}
.rs-h{flex:1;text-align:center;font-size:10px;font-weight:700;border-radius:4px;padding:2px 0}
.rs-row{display:flex;gap:4px;margin-bottom:2px}
.rs-cell{flex:1;height:22px;display:flex;align-items:center;justify-content:center;border-radius:3px;font-size:12px;font-weight:700;border:1px solid #2A3A5C}
.rs-div{width:8px;display:flex;align-items:center;justify-content:center}
.rs-total{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;font-weight:700;padding:4px 0;border-top:1px solid #2A3A5C}

/* ANALYSIS */
.stat-card{background:#1A2540;border-radius:8px;padding:8px;margin-bottom:6px}
.stat-card h3{font-size:11px;font-weight:700;margin-bottom:6px;color:#94A3B8}
.kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:8px}
.kpi{background:#131C30;border-radius:7px;padding:5px 4px;text-align:center}
.kpi-val{font-size:15px;font-weight:800}
.kpi-lbl{font-size:8px;color:#56627A}
.slot-chart{display:flex;gap:2px;align-items:flex-end;height:40px;margin-bottom:2px}
.slot-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.slot-bar-val{font-size:8px;color:#F1F5F9}
.slot-bar-inner{position:relative;width:76%;min-height:2px;border-radius:2px 2px 0 0}
.slot-labels{display:flex;gap:2px;border-top:1px solid #2A3A5C;padding-top:2px}
.slot-labels span{flex:1;text-align:center;color:#94A3B8;font-size:9px}
.heat-row{display:flex;gap:8px;justify-content:space-around;margin-bottom:6px}
.heat-col{text-align:center}
.heat-col p{font-size:8px;color:#94A3B8;margin-top:2px}
.mini-heat{display:inline-block;background:#0d1322;border-radius:6px;padding:4px}
.mh-row{display:flex;gap:2px;margin-bottom:2px}
.mh-row:last-child{margin-bottom:0}
.mh-cell{width:22px;height:19px;display:flex;align-items:center;justify-content:center;border-radius:3px;font-size:10px;font-weight:700}
.route-card{background:#131C30;border-radius:8px;padding:6px 10px;margin-bottom:4px;border-left:3px solid #F97316}
.route-player{font-size:11px;font-weight:700;margin-bottom:4px}
.route-tags{display:flex;flex-wrap:wrap;gap:4px}
.route-tag{background:#1A2540;border-radius:6px;padding:3px 8px;display:flex;gap:4px;align-items:center;font-size:11px}

/* SERVE ZONE ANALYSIS */
.sz-grid{background:#0B1A0B;border-radius:8px;padding:8px;margin-bottom:8px}
.sz-row{display:flex;gap:4px;margin-bottom:4px}
.sz-row:last-child{margin-bottom:0}
.sz-cell{flex:1;aspect-ratio:1.3;border-radius:7px;padding:3px 2px;text-align:center;position:relative;border:1px solid rgba(255,255,255,0.1)}
.sz-z{font-size:7px;color:#56627A}
.sz-n{font-weight:800;font-size:13px;line-height:1}
.sz-ace{font-size:8px;font-weight:700;color:#22C55E}
.sz-pct{position:absolute;bottom:2px;right:2px;font-size:7px;color:#EAB308}
.eff-bar{display:flex;align-items:center;gap:8px;margin-bottom:4px;padding:4px 8px;background:#1A2540;border-radius:6px}
.eff-bar-z{font-weight:700;font-size:12px;min-width:48px}
.eff-bar-track{flex:1;height:6px;background:#2A3A5C;border-radius:3px}
.eff-bar-fill{height:100%;border-radius:3px}
.eff-bar-pct{font-size:11px;font-weight:700;min-width:32px;text-align:right}
.eff-bar-cnt{font-size:9px;color:#94A3B8;min-width:28px}

/* PLAYER TABLE */

  <div class="pw-sub">バレーボール分析アプリ</div>
  <div class="pw-input-wrap">
    <input class="pw-input" id="pw-input" type="password" placeholder="パスワードを入力"
      maxlength="20" autocomplete="off" autocorrect="off" spellcheck="false"
      onkeydown="if(event.key==='Enter')checkPW()">
  </div>
  <button class="pw-btn" onclick="checkPW()">入力</button>
  <div class="pw-error" id="pw-error"></div>
  <div id="fb-status" style="color:#56627A;font-size:10px;margin-top:16px;margin-bottom:8px"></div>

    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20">
    Googleでログイン
  </button>
  <div class="pw-contact">
    パスワードをお持ちでない方は<br>
    <a href="https://line.me" target="_blank">公式LINE</a> からお問い合わせください
  </div>
</div>

<script>
// ── パスワード設定（ここを変更） ──
const APP_PASSWORD = 'revolley2024';

function checkPW(){
  const val=document.getElementById('pw-input').value;
  const input=document.getElementById('pw-input');
  const err=document.getElementById('pw-error');
  if(val===APP_PASSWORD){
    // 正解: パスワードをlocalStorageに保存してアプリを表示
    localStorage.setItem('revolley_auth', btoa(APP_PASSWORD));
    document.getElementById('pw-screen').style.display='none';
  } else {
    input.classList.add('error');
    err.textContent='パスワードが違います';
    setTimeout(()=>{input.classList.remove('error');input.value='';},600);
  }
}

// 起動時に認証チェック
(function(){
  const saved=localStorage.getItem('revolley_auth');
  if(saved && atob(saved)===APP_PASSWORD){
    document.getElementById('pw-screen').style.display='none';
  }
})();
</script>

<script>

// ── サイドメニュー ────────────────────────────────────────────────────
function openMenu(){
  document.getElementById('side-menu').classList.add('open');
  document.getElementById('menu-overlay').classList.add('open');
  // Firebase状態を表示
  const st=document.getElementById('menu-fb-status');
  if(st) st.textContent=fbUser?'☁️ '+fbUser.displayName:'ログインしていません';
}
function closeMenu(){
  document.getElementById('side-menu').classList.remove('open');
  document.getElementById('menu-overlay').classList.remove('open');
}
function menuGo(target){
  closeMenu();
  if(target==='myteam'){
    S._menuMode='myteam'; // メニューからの場合は保存して閉じるだけ
    S.setupStep='myteam';
    renderSetStart();
    document.getElementById('ss-modal').classList.add('show');
  } else if(target==='oppteam'){
    S._menuMode='oppteam';
    S.setupStep='oppteam';
    renderSetStart();
    document.getElementById('ss-modal').classList.add('show');
  } else if(target==='newmatch'){
    S._menuMode=null;
    S.setupStep='myteam';
    S.showSetStart=true;
    renderSetStart();
    document.getElementById('ss-modal').classList.add('show');
  } else if(target==='history'){
    S._teamsSubTab='history';
    S.rightTab='teams';
    // タブのアクティブ状態をリセット
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    renderRight();
  } else if(target==='settings'){
    switchTab('settings');
  } else if(target==='rotation'){
    switchTab('rotation');
  } else if(target==='analysis'){
    switchTab('analysis');
  } else if(target==='strategy'){
    switchTab('strategy');
  } else if(target==='scout'){
    openScoutMode();
  }
}


// ── クイック操作 ────────────────────────────────────────────────────
// 得点を即記録（アクション詳細なし）
function quickScore(team){
  // 現在のフローをキャンセル
  cancelFlow();
  const ac={code:'QS',label:'得点',color:'#22C55E',kind:'point'};
  const prevActorTeam=S.actorTeam||team;
  S.actorTeam=team;
  S.actorNum=null;
  // エントリを直接作成
  const scoringSide=team;
  const entry={
    id:Date.now()+Math.random(), team, setNum:S.curSet,
    code:'QS', label:'得点（手動）', slot:null, zone:null,
    scoringSide, kind:'point',
    playerNum:null, playerName:null,
    oppPlayerNum:null, oppPlayerName:null,
    isBackRow:false, isBackAttack:false,
    serverBefore:S.server, serveZone:S.serveZone,
    ts:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
  };
  S.history.push({rally:JSON.parse(JSON.stringify(S.rally)),rotA:{...S.rotA},rotB:{...S.rotB},server:S.server,serveZone:S.serveZone,serveZoneLocked:S.serveZoneLocked,inRallyState:S.inRallyState});
  S.rally.push(entry);
  saveCurrentMatch();
  applyAutoRotation(scoringSide);
  toast((team==='A'?S.teamA:S.teamB)+' 得点（手動）');
  startNextRally();
  S.actorTeam=null;
  render();
}

// スキップ：現在の入力を中断して詳細なしで記録（得点なし・継続扱い）

// 点数を減らす（直前の得点エントリを削除）
function quickMinus(team){
  // 指定チームの最後の得点エントリを1つ削除
  const idx=S.rally.map((r,i)=>({r,i})).reverse().find(({r})=>r.scoringSide===team);
  if(!idx){toast('取り消せる得点がありません');return;}
  S.history.push({rally:JSON.parse(JSON.stringify(S.rally)),rotA:{...S.rotA},rotB:{...S.rotB},server:S.server,serveZone:S.serveZone,serveZoneLocked:S.serveZoneLocked,inRallyState:S.inRallyState});
  S.rally.splice(idx.i,1);
  saveCurrentMatch();
  toast((team==='A'?S.teamA:S.teamB)+' −1点');
  render();
}

function quickSkip(){
  // アクション途中なら中断して記録
  if(S.pendAction){
    const ac=S.pendAction;
    const team=S.actorTeam;
    if(team&&ac){
      const entry={
        id:Date.now()+Math.random(), team, setNum:S.curSet,
        code:ac.code, label:ac.label+'(skip)', slot:S.pendSlot||null, zone:S.pendZone||null,
        scoringSide:null, kind:'neutral', // 得点なし
        playerNum:S.actorNum, playerName:null,
        oppPlayerNum:null, oppPlayerName:null,
        isBackRow:S.isBackRow||false, isBackAttack:S._isBackAttack||false,
        serverBefore:S.server, serveZone:S.serveZone,
        ts:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
      };
      S.history.push({rally:JSON.parse(JSON.stringify(S.rally)),rotA:{...S.rotA},rotB:{...S.rotB},server:S.server,serveZone:S.serveZone,serveZoneLocked:S.serveZoneLocked,inRallyState:S.inRallyState});
      S.rally.push(entry);
      saveCurrentMatch();
      toast('スキップ記録');
    }
  }
  cancelFlow();
  render();
}


// ── スカウティングモード（他チーム同士の試合記録）────────────────────────
let scoutState=null; // スカウティング中の状態

function openScoutMode(){
  // モーダルを開く
  let modal=document.getElementById('scout-modal');
  if(!modal){
    modal=document.createElement('div');
    modal.id='scout-modal';
    modal.style.cssText='position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:16px';
    document.body.appendChild(modal);
  }
  renderScoutModal();
  modal.style.display='flex';
}

function closeScoutMode(){
  const modal=document.getElementById('scout-modal');
  if(modal) modal.style.display='none';
}

function renderScoutModal(){
  const modal=document.getElementById('scout-modal');
  if(!modal) return;
  const scouts=JSON.parse(localStorage.getItem('revolley_scouts')||'[]');

  modal.innerHTML=`<div style="background:#0d1322;border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:16px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <div style="font-size:18px;font-weight:800;color:#F1F5F9;flex:1">🔍 スカウティング記録</div>
      <button onclick="closeScoutMode()" style="background:transparent;border:none;color:#56627A;font-size:20px;cursor:pointer">×</button>
    </div>

    <!-- 新規記録ボタン -->
    <button onclick="startNewScout()" style="width:100%;padding:12px;background:#F97316;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:16px">
      ＋ 新しいスカウティングを開始
    </button>

    <!-- 過去のスカウティング記録 -->
    <div style="font-size:11px;font-weight:700;color:#56627A;margin-bottom:8px">過去の記録（${scouts.length}件）</div>
    ${scouts.length===0?'<div style="color:#56627A;text-align:center;padding:20px;font-size:12px">記録がありません</div>':''}
    ${scouts.map((s,i)=>`
      <div style="background:#1A2540;border-radius:10px;padding:10px 12px;margin-bottom:6px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <div style="font-size:12px;color:#56627A">${s.date}</div>
          <div style="font-size:13px;font-weight:700;color:#F1F5F9;flex:1">${s.teamA} vs ${s.teamB}</div>
          <div style="font-size:12px;font-weight:800;color:#F97316">${s.scoreA}-${s.scoreB}</div>
        </div>
        <div style="display:flex;gap:6px">
          <button onclick="viewScout(${i})" style="flex:1;padding:6px;background:#3B82F6;border:none;border-radius:7px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">📊 分析</button>
          <button onclick="if(confirm('削除しますか？')){deleteScout(${i})}" style="padding:6px 10px;background:transparent;border:1px solid #EF4444;border-radius:7px;color:#EF4444;font-size:10px;cursor:pointer">×</button>
        </div>
      </div>`).join('')}
  </div>`;
}

function startNewScout(){
  const modal=document.getElementById('scout-modal');
  modal.innerHTML=`<div style="background:#0d1322;border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:16px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <button onclick="renderScoutModal()" style="background:transparent;border:none;color:#56627A;font-size:16px;cursor:pointer">←</button>
      <div style="font-size:16px;font-weight:800;color:#F1F5F9;flex:1">スカウティング設定</div>
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:11px;color:#56627A;margin-bottom:4px">チームA名</div>
      <input id="sc-teamA" placeholder="チームA" style="width:100%;padding:10px;background:#131C30;border:1px solid #2A3A5C;border-radius:8px;color:#F1F5F9;font-size:14px">
    </div>
    <div style="margin-bottom:16px">
      <div style="font-size:11px;color:#56627A;margin-bottom:4px">チームB名</div>
      <input id="sc-teamB" placeholder="チームB" style="width:100%;padding:10px;background:#131C30;border:1px solid #2A3A5C;border-radius:8px;color:#F1F5F9;font-size:14px">
    </div>
    <button onclick="beginScout()" style="width:100%;padding:12px;background:#F97316;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer">
      記録開始 →
    </button>
  </div>`;
}

function beginScout(){
  const teamA=document.getElementById('sc-teamA').value||'チームA';
  const teamB=document.getElementById('sc-teamB').value||'チームB';
  scoutState={
    id:'sc_'+Date.now(),
    date:new Date().toLocaleDateString('ja-JP'),
    teamA,teamB,
    scoreA:0,scoreB:0,
    rally:[],
    server:'A',
  };
  closeScoutMode();
  renderScoutRecorder();
}

function renderScoutRecorder(){
  let overlay=document.getElementById('scout-rec');
  if(!overlay){
    overlay=document.createElement('div');
    overlay.id='scout-rec';
    overlay.style.cssText='position:fixed;inset:0;z-index:8500;background:#05080f;display:flex;flex-direction:column';
    document.body.appendChild(overlay);
  }
  if(!scoutState){overlay.style.display='none';return;}
  const s=scoutState;
  overlay.style.display='flex';
  overlay.innerHTML=`
    <div style="background:#0d1322;padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:2px solid #F97316">
      <button onclick="saveAndCloseScout()" style="background:transparent;border:none;color:#56627A;font-size:14px;cursor:pointer">← 終了</button>
      <div style="flex:1;font-size:13px;font-weight:700;color:#F1F5F9;text-align:center">${s.teamA} vs ${s.teamB}</div>
    </div>
    <!-- スコア -->
    <div style="display:flex;align-items:center;justify-content:center;gap:24px;padding:16px;background:#0d1322">
      <div style="text-align:center">
        <div style="font-size:12px;color:#F97316;font-weight:700">${s.teamA}</div>
        <div style="font-size:48px;font-weight:900;color:#F97316">${s.scoreA}</div>
      </div>
      <div style="color:#56627A;font-size:24px">:</div>
      <div style="text-align:center">
        <div style="font-size:12px;color:#3B82F6;font-weight:700">${s.teamB}</div>
        <div style="font-size:48px;font-weight:900;color:#3B82F6">${s.scoreB}</div>
      </div>
    </div>
    <!-- サーブ表示 -->
    <div style="text-align:center;font-size:11px;color:#94A3B8;padding:4px">
      ${s.server==='A'?s.teamA:s.teamB} サーブ
    </div>
    <!-- 得点ボタン -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px;flex:1">
      <button onclick="scoutScore('A')" style="padding:0;background:rgba(249,115,22,0.15);border:3px solid #F97316;border-radius:16px;color:#F97316;font-size:28px;font-weight:900;cursor:pointer;min-height:120px">
        ${s.teamA}<br>＋1
      </button>
      <button onclick="scoutScore('B')" style="padding:0;background:rgba(59,130,246,0.15);border:3px solid #3B82F6;border-radius:16px;color:#3B82F6;font-size:28px;font-weight:900;cursor:pointer;min-height:120px">
        ${s.teamB}<br>＋1
      </button>
    </div>
    <!-- 取り消し -->
    <div style="padding:0 16px 16px;display:flex;gap:8px">
      <button onclick="scoutUndo()" style="flex:1;padding:10px;background:rgba(239,68,68,0.15);border:1px solid #EF4444;border-radius:10px;color:#EF4444;font-size:13px;font-weight:700;cursor:pointer">⟲ 取り消し</button>
      <button onclick="saveAndCloseScout()" style="flex:1;padding:10px;background:#22C55E;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer">✓ 保存</button>
    </div>`;
}

function scoutScore(team){
  if(!scoutState) return;
  const prevServer=scoutState.server;
  scoutState.rally.push({scoringSide:team,server:prevServer,ts:Date.now()});
  if(team==='A') scoutState.scoreA++;
  else scoutState.scoreB++;
  // サイドアウト判定
  if(team!==prevServer) scoutState.server=team;
  renderScoutRecorder();
}

function scoutUndo(){
  if(!scoutState||!scoutState.rally.length) return;
  const last=scoutState.rally.pop();
  if(last.scoringSide==='A') scoutState.scoreA--;
  else scoutState.scoreB--;
  scoutState.server=last.server;
  renderScoutRecorder();
}

function saveAndCloseScout(){
  if(!scoutState) return;
  const scouts=JSON.parse(localStorage.getItem('revolley_scouts')||'[]');
  const existing=scouts.findIndex(s=>s.id===scoutState.id);
  if(existing>=0) scouts[existing]=scoutState;
  else scouts.unshift(scoutState);
  localStorage.setItem('revolley_scouts',JSON.stringify(scouts.slice(0,50)));
  scoutState=null;
  const overlay=document.getElementById('scout-rec');
  if(overlay) overlay.style.display='none';
  openScoutMode();
}

function deleteScout(i){
  const scouts=JSON.parse(localStorage.getItem('revolley_scouts')||'[]');
  scouts.splice(i,1);
  localStorage.setItem('revolley_scouts',JSON.stringify(scouts));
  renderScoutModal();
}

function viewScout(i){
  const scouts=JSON.parse(localStorage.getItem('revolley_scouts')||'[]');
  const s=scouts[i];
  if(!s) return;
  const modal=document.getElementById('scout-modal');
  const scoreA=s.rally.filter(r=>r.scoringSide==='A').length;
  const scoreB=s.rally.filter(r=>r.scoringSide==='B').length;
  modal.innerHTML=`<div style="background:#0d1322;border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:16px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <button onclick="renderScoutModal()" style="background:transparent;border:none;color:#56627A;font-size:16px;cursor:pointer">←</button>
      <div style="font-size:15px;font-weight:800;color:#F1F5F9;flex:1">${s.teamA} vs ${s.teamB}</div>
    </div>
    <div style="background:#1A2540;border-radius:12px;padding:16px;text-align:center;margin-bottom:16px">
      <div style="font-size:11px;color:#56627A;margin-bottom:8px">${s.date}</div>
      <div style="display:flex;justify-content:center;align-items:center;gap:24px">
        <div><div style="font-size:13px;color:#F97316;font-weight:700">${s.teamA}</div>
          <div style="font-size:48px;font-weight:900;color:#F97316">${scoreA}</div></div>
        <div style="color:#56627A;font-size:20px">:</div>
        <div><div style="font-size:13px;color:#3B82F6;font-weight:700">${s.teamB}</div>
          <div style="font-size:48px;font-weight:900;color:#3B82F6">${scoreB}</div></div>
      </div>
    </div>
    <div style="font-size:12px;font-weight:700;color:#94A3B8;margin-bottom:8px">ラリー記録（${s.rally.length}本）</div>
    <div style="max-height:300px;overflow-y:auto">
    ${s.rally.map((r,ri)=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;background:${ri%2?'#131C30':'#1A2540'}">
      <div style="font-size:10px;color:#56627A;min-width:20px">${ri+1}</div>
      <div style="flex:1;font-size:11px;font-weight:700;color:${r.scoringSide==='A'?'#F97316':'#3B82F6'}">${r.scoringSide==='A'?s.teamA:s.teamB} 得点</div>
      <div style="font-size:9px;color:#56627A">${r.server==='A'?s.teamA:s.teamB}サーブ</div>
    </div>`).join('')}
    </div>
    <button onclick="scoutState=scouts[${i}];closeScoutMode();renderScoutRecorder()" style="width:100%;padding:10px;background:#F97316;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-top:12px">
      ✏️ この記録を続ける
    </button>
  </div>`;
}

// ── State ──────────────────────────────────────────────────────────────
const S = {

  rightTab: 'log',
  mcTeam: null, mcOutNum: null, mcInNum: null,
  rosterEditTeam: null, rosterEditRows: [],
  rotEditTeam: null, rotEditPos: null,
  showSetStart: true,
  setupStep: 'myteam', // 'myteam' | 'mode' | 'oppteam' | 'serve'
  _setupOppId: null,
  _setupEditOppId: null,
  formations: {A:{},B:{}},
  rotInitA: {1:null,2:null,3:null,4:null,5:null,6:null}, // 試合開始時の初期配置

  currentMatchId: null,  // 現在の試合ID
  currentOppTeamId: null,// 現在の対戦相手ID
  // ── Settings ─────────────────────────────────────────────────────
  settings: {
    // 記録する項目（各チーム別にON/OFF）
    own: {
      serveZone:true, spikeSlot:true, spikeZone:true, reception:true, receptionGrade:true,
      block:true, dig:true, toss:true, misc:true, backAttack:true, killOppSelect:true, serveOppSelect:true,
    },

// ── Helpers ───────────────────────────────────────────────────────────
function pct(n,d){return d===0?'—':Math.round(n/d*100)+'%';}
// 時計回りローテーション
// コート配置: ネット側 [P4,P3,P2] / バック側 [P5,P6,P1]
// 時計回り: P1(右後)→P2(右前)→P3(中前)→P4(左前)→P5(左後)→P6(中後)→P1
// サイドアウト時: 得点チームが時計回りに1つ回転 = 各ポジションに「次の番号」の選手が入る
// P1←P2, P2←P3, P3←P4, P4←P5, P5←P6, P6←P1
// 時計回りローテーション（サイドアウト時）
// P1←P2, P2←P3, P3←P4, P4←P5, P5←P6, P6←P1
function rotCW(rot){
  return {1:rot[2],2:rot[3],3:rot[4],4:rot[5],5:rot[6],6:rot[1]};
}
function getRoster(t){return t==='A'?S.rosterA:S.rosterB;}
function getRot(t){return t==='A'?S.rotA:S.rotB;}
function getOppRot(t){return t==='A'?S.rotB:S.rotA;}
function getOppRoster(t){return t==='A'?S.rosterB:S.rosterA;}
function getTeamName(t){return t==='A'?S.teamA:S.teamB;}
function colorOf(t){return t==='A'?'#F97316':'#3B82F6';}
function pName(roster,num){return (roster.find(p=>p.number===num)||{}).name||'';}

function setRows(setNum){return S.rally.filter(r=>r.setNum===(setNum||S.curSet));}
function scoreOf(t,setNum){return setRows(setNum).filter(r=>r.scoringSide===t).length;}
function checkSetEnd(a,b){return (a>=25||b>=25)&&Math.abs(a-b)>=2;}

let _unsubscribeSync=null;
let _lastSaveTs=0; // 自分が保存した時刻（自分の更新を無視するため）

function startRealtimeSync(uid){
  stopRealtimeSync();
  if(!fbDb) return;
  _unsubscribeSync=fbDb.collection('users').doc(uid).onSnapshot(doc=>{
    if(!doc.exists) return;
    const data=doc.data();
    // 自分が3秒以内に保存した場合は無視（エコーバック防止）
    if(Date.now()-_lastSaveTs<4000) return;
    // マスターデータのみ更新
    if(data.myTeamName) S.myTeamName=data.myTeamName;
    if(data.myRoster&&data.myRoster.length>0) S.myRoster=data.myRoster;
    if(data.rotationPatterns) S.rotationPatterns=data.rotationPatterns;
    if(data.oppTeams) S.oppTeams=data.oppTeams;
    if(data.settings) S.settings=Object.assign({},S.settings,data.settings);
    if(data.formations) S.formations=data.formations;
    if(data.matches&&data.matches.length>S.matches.length){
      S.matches=data.matches;
    }
    showFbStatus('☁️ 同期完了');
    render();
  },err=>{console.warn('realtime sync error:',err);});
}

function stopRealtimeSync(){
  if(_unsubscribeSync){_unsubscribeSync();_unsubscribeSync=null;}
}

// ── Auto rotation ─────────────────────────────────────────────────────
function applyAutoRotation(scoringSide){
  if(scoringSide!==S.server){
    if(scoringSide==='A'){
      // ローテ前にリベロが前衛に行く場合は自動OUT
      autoLiberoOut('A');
      S.rotA=rotCW(S.rotA);
      S.rotLog.push({set:S.curSet,msg:S.teamA+' サイドアウト→ローテ'});
    }
    else{
      autoLiberoOut('B');
      S.rotB=rotCW(S.rotB);
      S.rotLog.push({set:S.curSet,msg:S.teamB+' サイドアウト→ローテ'});
    }
  }
  S.server=scoringSide;
}

// ローテ後に前衛になるリベロを自動でOUTする
function autoLiberoOut(team){
  const rot=getRot(team);
  const liberos=getLiberos(team);
  if(!liberos.length) return;
  // rotCW後のポジションを計算（P1←P2, P2←P3... P6←P1）
  // つまりローテ後: 現P2→P1, P3→P2, P4→P3, P5→P4, P6→P5, P1→P6
  // 前衛は ローテ後のP2,P3,P4 = 現在のP3,P4,P5
  const willBeFront=[rot[3],rot[4],rot[5]]; // ローテ後に前衛になる選手
  liberos.forEach(lib=>{
    if(willBeFront.includes(lib)){
      // このリベロは前衛に行くのでOUTする
      const sw=getLiberoSwaps(team);
      const libPos=Object.entries(rot).find(([,v])=>v===lib);
      if(!libPos) return;
      const pos=Number(libPos[0]);
      const inNum=sw[pos];
      if(!inNum) return;
      // 元の選手に戻す
      const newRot={...rot};
      newRot[pos]=inNum;
      if(team==='A') S.rotA=newRot; else S.rotB=newRot;
      setLiberoSwapPos(team,pos,null);
      S.rotLog.push({set:S.curSet,msg:`リベロ #${lib} 自動OUT（前衛移動）→ #${inNum}`});
    }
  });
}



function applyFormationToRot(team){
  // フォーメーションが1つも登録されていなければ何もしない
  const fms=S.formations[team]||{};
  if(!Object.keys(fms).length) return;
  const rot=team==='A'?S.rotA:S.rotB;
  const rotInit=team==='A'?S.rotInitA:S.rotInitB;
  if(!rotInit||!Object.values(rotInit).some(Boolean)) return;
  const currentP1=Number(rot[1]);
  if(!currentP1) return;
  let rotOrder=null;
  for(let pos=1;pos<=6;pos++){
    if(Number(rotInit[pos])===currentP1){rotOrder=pos;break;}
  }
  if(!rotOrder) return;
  const fm=getFormation(team,rotOrder);
  if(Object.keys(fm).length<5) return; // 5人未満は適用しない
  const newRot={};
  for(let pos=1;pos<=6;pos++){
    newRot[pos]=fm[pos]?Number(fm[pos]):rot[pos];
  }
  if(team==='A') S.rotA=newRot; else S.rotB=newRot;
}

// ── Commit ────────────────────────────────────────────────────────────
function commitAction(ac,slot,zone,oppNum){
  const team=S.actorTeam;
  const roster=getRoster(team);
  const oppRoster=getOppRoster(team);
  const actorName=pName(roster,S.actorNum);
  const oppName=pName(oppRoster,oppNum);
  let scoringSide=null;
  if(ac.kind==='point') scoringSide=team;
  else if(ac.kind==='miss') scoringSide=team==='A'?'B':'A';
  // R+A/R+B/R+C → receptionGradeを自動付与、codeはR+に統一
  const recGrade=ac.code==='R+A'?'A':ac.code==='R+B'?'B':ac.code==='R+C'?'C':null;
  const entryCode=recGrade?'R+':ac.code;
  // S_REC は内部コード → S0 として記録
  const entryCode2=entryCode==='S_REC'?'S0':entryCode;
  const entry={
    id:Date.now()+Math.random(), team, setNum:S.curSet,
    code:entryCode2, label:ac.label, slot, zone, scoringSide, kind:ac.kind,
    playerNum:S.actorNum, playerName:actorName,
    oppPlayerNum:oppNum, oppPlayerName:oppName,
    receptionGrade:recGrade,
    isBackRow:S.isBackRow||false,
    isBackAttack:S._isBackAttack===true, // バックアタックパネルから選択した場合のみtrue
    serverBefore:S.server, serveZone:S.serveZone,
    ts:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
  };
  S.history.push({rally:JSON.parse(JSON.stringify(S.rally)),rotA:{...S.rotA},rotB:{...S.rotB},server:S.server,serveZone:S.serveZone,serveZoneLocked:S.serveZoneLocked,inRallyState:S.inRallyState});
  S.rally.push(entry);
  S.inRallyState=true;
  saveCurrentMatch();
  if(scoringSide) applyAutoRotation(scoringSide);
  toast((team==='A'?S.teamA:S.teamB)+(S.actorNum?' #'+S.actorNum:'')+' '+ac.code+(slot?' ['+slot+']':'')+(zone?'→'+zone:''));
  if(scoringSide) startNextRally();
  else cancelFlow();
  render();
}

function commitServeAction(ac,zone,oppPlayerNum){
  const team=S.server;
  const rot=getRot(team);
  const roster=getRoster(team);
  const oppRoster=getOppRoster(team);
  const serverNum=rot[1];
  const serverName=pName(roster,serverNum);
  const oppName=pName(oppRoster,oppPlayerNum);
  let scoringSide=null;
  if(ac.kind==='point') scoringSide=team;
  else if(ac.kind==='miss') scoringSide=team==='A'?'B':'A';
  const entry={
    id:Date.now()+Math.random(), team, setNum:S.curSet,
    code:ac.code, label:ac.label, slot:null, zone, scoringSide, kind:ac.kind,
    playerNum:serverNum, playerName:serverName,
    oppPlayerNum, oppPlayerName:oppName,
    serverBefore:S.server, serveZone:zone||S.serveZone,
    ts:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
  };
  S.history.push({rally:JSON.parse(JSON.stringify(S.rally)),rotA:{...S.rotA},rotB:{...S.rotB},server:S.server,serveZone:S.serveZone,serveZoneLocked:S.serveZoneLocked,inRallyState:S.inRallyState});
  S.rally.push(entry);
  S.pendingOppForServe=null;
  saveCurrentMatch(); // リアルタイム自動保存
  if(scoringSide) applyAutoRotation(scoringSide);
  toast((team==='A'?S.teamA:S.teamB)+(serverNum?' #'+serverNum:'')+' '+ac.code+(zone?'→Z'+zone:''));
  if(scoringSide) startNextRally();
  else{
    S.serveZoneLocked=true;
    // S+/S0 後もレセプション評価が可能なように inRallyState は false のまま
    cancelFlow();
  }
  render();
}

function undoAction(){
  if(!S.history.length) return;
  // 直前のスナップショットに戻す（1アクション分）
  const prev=S.history.pop();
  S.rally=prev.rally;
  S.rotA=prev.rotA; S.rotB=prev.rotB;
  S.server=prev.server;
  S.serveZone=prev.serveZone;
  S.serveZoneLocked=prev.serveZoneLocked;
  S.inRallyState=prev.inRallyState||false;
  S.pendingOppForServe=null;
  cancelFlow();
  saveToLS();
  render();
}

function cancelFlow(){
  S.actorTeam=null; S.actorNum=null; S.isBackRow=false; S.inRally=false;
  S.pendAction=null; S.pendSlot=null; S.pendZone=null; S.oppNum=null;

  closePopup();
}

function countSetWins(){
  let winsA=0,winsB=0;
  for(let i=1;i<=S.curSet;i++){
    const a=scoreOf('A',i),b=scoreOf('B',i);
    if(checkSetEnd(a,b)){
      if(a>b)winsA++;else winsB++;
    }
  }
  return{winsA,winsB};
}

function nextSet(){
  // 公式戦の終了チェック
  if(S.matchMode==='official3'||S.matchMode==='official5'){
    const winSets=S.matchMode==='official3'?2:3;
    const maxSets=S.matchMode==='official3'?3:5;
    const {winsA,winsB}=countSetWins();
    if(winsA>=winSets||winsB>=winSets){
      // 試合終了
      saveCurrentMatch();
      const winner=winsA>winsB?S.teamA:S.teamB;
      // 試合終了モーダルを表示
      showMatchEnd(winner,winsA,winsB);
      return;
    }
    if(S.curSet>=maxSets){
      saveCurrentMatch();
      const winner=winsA>winsB?S.teamA:S.teamB;
      showMatchEnd(winner,winsA,winsB);
      return;
    }
  }
  S.curSet++;
  S.showSetStart=true;
  S.setupStep='serve'; // セット間はサーブ権選択のみ
  startNextRally();
  render();
}

function doLiberoIn(team,liberoNum,pos,outNum){
  const rot=getRot(team);
  const newRot={...rot};
  // outNum が別のリベロの場合（リベロ同士の交代）
  const isLiberoSwap=isLibero(team,outNum);
  if(isLiberoSwap){
    // リベロAをOUT→リベロBをIN（swapは引き継ぐ）
    newRot[pos]=liberoNum;
    if(team==='A') S.rotA=newRot; else S.rotB=newRot;
    // outNum（リベロA）のswapはそのまま維持
    // liberoNumのswapをoutNum（リベロA）のswapに引き継ぐ
    const sw=getLiberoSwaps(team);
    if(sw[pos]) setLiberoSwapPos(team,pos,sw[pos]); // 元の一般選手を保持
  } else {
    newRot[pos]=liberoNum;
    if(team==='A') S.rotA=newRot; else S.rotB=newRot;
    setLiberoSwapPos(team,pos,outNum);
  }
  const sa=scoreOf('A'),sb=scoreOf('B');
  const label=isLiberoSwap?`リベロ #${outNum}↔#${liberoNum}`:`リベロ #${liberoNum} IN P${pos}（#${outNum}と交代）`;
  S.substitutions.push({team,outNum,inNum:liberoNum,set:S.curSet,score:`${sa}-${sb}`,isLibero:true,type:'in'});
  S.rotLog.push({set:S.curSet,msg:`Team ${team} ${label}`});
  toast(`🟣 ${label}`);
  S._liberoOpen=null;
  saveToLS(); render();
}

function doLiberoOut(team,liberoNum){
  // 特定リベロをコートから出す（交代相手は固定）
  const rot=getRot(team);
  const liberoPos=Object.entries(rot).find(([,v])=>v===liberoNum);
  if(!liberoPos) return;
  const pos=Number(liberoPos[0]);
  const sw=getLiberoSwaps(team);
  const inNum=sw[pos]||sw[String(pos)]; // このポジションの元の選手
  if(!inNum){toast('エラー: 交代相手が不明です');return;}
  const newRot={...rot};
  newRot[pos]=inNum;
  if(team==='A') S.rotA=newRot; else S.rotB=newRot;
  // swapを解除
  setLiberoSwapPos(team,pos,null);
  const sa=scoreOf('A'),sb=scoreOf('B');
  S.substitutions.push({team,outNum:liberoNum,inNum,set:S.curSet,score:`${sa}-${sb}`,isLibero:true,type:'out'});
  S.rotLog.push({set:S.curSet,msg:`Team ${team} リベロ #${liberoNum} OUT P${pos}（#${inNum}と交代）`});
  toast(`🟣 リベロ #${liberoNum} OUT → #${inNum}`);
  S._liberoOpen=null;
  saveToLS(); render();
}

// ── MC ────────────────────────────────────────────────────────────────
function pairCount(){
  const pc={};
  S.substitutions.forEach(s=>{
    const k=[s.outNum,s.inNum].sort((a,b)=>a-b).join('-');
    pc[k]=(pc[k]||0)+1;
  });
  return pc;
}
function fullyLocked(){
  const pc=pairCount(); const fl=new Set();
  Object.entries(pc).forEach(([k,cnt])=>{if(cnt>=2){const[a,b]=k.split('-').map(Number);fl.add(a);fl.add(b);}});
  return fl;
}
function getPairPartner(team,num){
  const ts=S.substitutions.filter(s=>s.team===team);
  const s=ts.find(s=>s.outNum===num||s.inNum===num);
  if(!s) return null;
  return s.outNum===num?s.inNum:s.outNum;
}

function renderMC(){
  const team=S.mcTeam;
  const color=colorOf(team);
  const rot=getRot(team);
  const roster=getRoster(team);
  const onCourt=Object.values(rot).filter(Boolean);
  const bench=roster.filter(p=>!onCourt.includes(p.number));
  const fl=fullyLocked();
  const teamSubs=S.substitutions.filter(s=>s.team===team);
  const pc=pairCount();

  const canGoOut=onCourt.filter(n=>!fl.has(n));

  function getCanComeIn(out){
    if(!out) return [];
    const partner=getPairPartner(team,out);
    if(partner) return bench.filter(p=>p.number===partner&&!fl.has(p.number));
    return bench.filter(p=>{
      if(fl.has(p.number)) return false;
      const pp=getPairPartner(team,p.number);
      if(pp!==null&&pp!==out) return false;
      return true;
    });
  }
  const canComeIn=getCanComeIn(S.mcOutNum);

  let html=`<div class="mc-title" style="color:${color}">MC — Team ${team}</div>
  <div class="mc-sub">同一ペアの往復のみ可（往復後は🔒ロック）</div>
  <div class="mc-section"><div class="mc-section-lbl">① 退く選手（コート内）</div>
  <div class="mc-players">`;
  onCourt.forEach(num=>{
    const p=roster.find(r=>r.number===num);
    const blocked=!canGoOut.includes(num);
    const sel=S.mcOutNum===num;
    const partner=getPairPartner(team,num);
    html+=`<div class="mc-player${sel?' sel':''}${blocked?' blocked':''}" onclick="mcSelectOut(${num})">
      <div class="mcn">#${num}</div><div class="mcnm">${p?p.name:''}</div>
      ${partner&&!blocked?`<div class="mc-pair" style="color:${color}">⇄#${partner}</div>`:''}
      ${blocked?'<span style="position:absolute;top:2px;right:4px;font-size:9px">🔒</span>':''}
    </div>`;
  });
  html+='</div></div>';

  if(S.mcOutNum){
    html+=`<div class="mc-section"><div class="mc-section-lbl">② 入る選手${getPairPartner(team,S.mcOutNum)?` (#${getPairPartner(team,S.mcOutNum)}のみ)`:''}</div>`;
    if(!canComeIn.length){
      html+='<div style="color:#EF4444;font-size:12px">使用可能な交代選手がいません</div>';
    } else {
      html+='<div class="mc-players">';
      canComeIn.forEach(p=>{
        const inSel=S.mcInNum===p.number;
        html+=`<div class="mc-player${inSel?' in-sel':''}" onclick="mcSelectIn(${p.number})">
          <div class="mcn">#${p.number}</div><div class="mcnm">${p.name}</div></div>`;
      });
      html+='</div>';
    }
    const blockedBench=bench.filter(p=>!canComeIn.find(c=>c.number===p.number));
    if(blockedBench.length){
      html+='<div style="color:#56627A;font-size:9px;margin-top:6px">使用不可</div><div class="mc-blocked-list">';
      blockedBench.forEach(p=>{html+=`<div class="mc-blocked-chip">#${p.number} 🔒</div>`;});
      html+='</div>';
    }
    html+='</div>';
  }

  if(teamSubs.length){
    html+='<div class="mc-hist"><div class="mc-hist-lbl">交代履歴</div>';
    teamSubs.forEach(s=>{
      const k=[s.outNum,s.inNum].sort((a,b)=>a-b).join('-');
      const locked=(pc[k]||0)>=2;
      html+=`<div class="mc-hist-row"><span>Set${s.set} ${s.score}: <span style="color:#EF4444">#${s.outNum}</span>→<span style="color:#22C55E">#${s.inNum}</span></span>${locked?'<span style="font-size:9px">🔒完了</span>':''}</div>`;
    });
    html+='</div>';
  }

  html+=`<div class="mc-footer">
    <button class="mc-cancel" onclick="closeMC()">キャンセル</button>
    <button class="mc-confirm" ${!S.mcOutNum||!S.mcInNum?'disabled':''} onclick="confirmMC()">交代確定</button>
  </div>`;

  document.getElementById('mc-box').style.borderColor=color;
  document.getElementById('mc-box').innerHTML=html;
}

function mcSelectOut(num){
  S.mcOutNum=S.mcOutNum===num?null:num; S.mcInNum=null; renderMC();
}
function mcSelectIn(num){
  S.mcInNum=S.mcInNum===num?null:num; renderMC();
}
function confirmMC(){
  if(!S.mcOutNum||!S.mcInNum) return;
  const team=S.mcTeam;
  const rot=getRot(team);
  const newRot={...rot};
  const pos=Object.entries(rot).find(([,v])=>v===S.mcOutNum);
  if(pos) newRot[Number(pos[0])]=S.mcInNum;
  if(team==='A') S.rotA=newRot; else S.rotB=newRot;
  const sa=scoreOf('A'), sb=scoreOf('B');
  S.substitutions.push({team,outNum:S.mcOutNum,inNum:S.mcInNum,set:S.curSet,score:`${sa}-${sb}`});
  toast(`MC: #${S.mcOutNum}→#${S.mcInNum} (${team})`);
  saveToLS(); closeMC(); render();
}

// ── Roster ───────────────────────────────────────────────────────────
function openRoster(team){
  S.rosterEditTeam=team;
  S.rosterEditRows=(team==='A'?S.rosterA:S.rosterB).map(r=>({...r}));
  renderRosterModal();
  document.getElementById('roster-modal').classList.add('show');
}
function closeRoster(){document.getElementById('roster-modal').classList.remove('show');}
function renderRosterModal(){
  const team=S.rosterEditTeam, color=colorOf(team);
  let html=`<div class="rm-title" style="color:${color}">Team ${team} ロスター</div>`;
  S.rosterEditRows.forEach((r,i)=>{
    html+=`<div class="rm-row">
      <input class="rm-num" value="${r.number}" oninput="rosterEditNum(${i},this.value)" placeholder="#">
      <input class="rm-name" value="${r.name}" oninput="rosterEditName(${i},this.value)" placeholder="選手名">
      <button class="rm-del" onclick="rosterDelRow(${i})">×</button>
    </div>`;
  });
  html+=`<button class="rm-add" onclick="rosterAddRow()">＋ 追加</button>
  <div class="rm-footer">
    <button class="rm-cancel" onclick="closeRoster()">キャンセル</button>
    <button class="rm-save" style="background:${color}" onclick="saveRoster()">保存</button>
  </div>`;
  document.getElementById('rm-box').innerHTML=html;
}
function rosterEditNum(i,v){S.rosterEditRows[i].number=isNaN(v)?v:Number(v);}
function rosterEditName(i,v){S.rosterEditRows[i].name=v;}
function rosterDelRow(i){S.rosterEditRows.splice(i,1);renderRosterModal();}
function rosterAddRow(){S.rosterEditRows.push({number:'',name:''});renderRosterModal();}
function saveRoster(){
  const rows=S.rosterEditRows.filter(r=>String(r.number).trim()!=='');
  if(S.rosterEditTeam==='A') S.rosterA=rows; else S.rosterB=rows;
  closeRoster(); render();
}

function applySelectedPattern(){
  if(!S._selectedPatternId) return;
  const pat=(S.rotationPatterns||[]).find(p=>p.id===S._selectedPatternId);
  if(!pat) return;
  const newRot={1:null,2:null,3:null,4:null,5:null,6:null};
  for(let pos=1;pos<=6;pos++){
    if(pat.rot[pos]) newRot[pos]=Number(pat.rot[pos]);
  }
  S.rotA=newRot;
}

function startSet(team){
  S.server=team; S.showSetStart=false;
  // 新しい試合IDがなければ生成してリセット
  if(!S.currentMatchId){
    S.currentMatchId=genId();
    S.rally=[]; S.history=[]; S.curSet=1;
    S.substitutions=[]; S.rotLog=[];
  }
  // パターンが選択されていれば適用（自動配置より優先）
  if(S._selectedPatternId){
    const pat=(S.rotationPatterns||[]).find(p=>p.id===S._selectedPatternId);
    if(pat){
      const newRot={1:null,2:null,3:null,4:null,5:null,6:null};
      for(let pos=1;pos<=6;pos++){
        if(pat.rot[pos]) newRot[pos]=Number(pat.rot[pos]);
      }
      S.rotA=newRot;
    }
  } else {
    // パターン未選択時のみrosterから自動配置
    const rotAEmpty=!Object.values(S.rotA).some(Boolean);
    if(rotAEmpty&&S.rosterA.length>0){
      S.rosterA.slice(0,6).forEach((p,i)=>{S.rotA[i+1]=p.number||null;});
    }
  }
  const rotBEmpty=!Object.values(S.rotB).some(Boolean);
  if(rotBEmpty&&S.rosterB.length>0){
    S.rosterB.slice(0,6).forEach((p,i)=>{S.rotB[i+1]=p.number||null;});
  }
  S.rotInitA={...S.rotA};
  S.rotInitB={...S.rotB};
  S._selectedPatternId=null; // リセット
  document.getElementById('ss-modal').classList.remove('show');
  render();
}


// ── ポジション・ローテーションから自動配置 ─────────────────────────────
function applyRotOrderToRot(roster, rotState){
  // rotOrder が設定されている選手を自動配置
  const newRot={...rotState};
  const assigned=roster.filter(p=>p.rotOrder&&p.rotOrder>=1&&p.rotOrder<=6);
  if(assigned.length===0) return rotState; // 未設定なら変更なし
  assigned.forEach(p=>{
    newRot[p.rotOrder]=p.number;
  });
  return newRot;
}

function getSystemName(roster){
  const setters=roster.filter(p=>p.pos==='S');
  if(setters.length===1) return '5-1';
  if(setters.length===2) return '6-2';
  return '不明';
}

function courtCellHTML(pos,num,roster,team,isOppSide){
  const color=colorOf(team);
  const isActor=S.actorTeam===team&&S.actorNum===num;
  const isOppSel=S.oppNum===num&&team!==S.actorTeam;
  const player=num?roster.find(p=>p.number===num):null;
  const isServer=S.server===team&&pos===1;
  const isLib=isLibero(team,num);
  let cls='court-cell';
  if(!num) cls+=' empty';
  if(isActor) cls+=' actor';
  if(isOppSel) cls+=' opp-sel';
  if(isServer) cls+=' server-pos';
  const bdr=isActor?`border-color:${color};background:rgba(${hexToRgb(color)},0.3)`
    :isOppSel?'border-color:#3B82F6;background:rgba(59,130,246,0.3)'
    :num?`border-color:rgba(${hexToRgb(color)},0.4);background:rgba(${hexToRgb(color)},0.1)`:
    'border-color:#2A3A5C;background:#1A2540;cursor:default';
  return `<div class="${cls}" style="${bdr}" onclick="onCellClick('${team}',${num||0})">
    <div class="pos-lbl">${isServer?'★S':''}${isLib?'🟣':''} P${pos}</div>
    ${num?`<div class="num" style="color:${isActor||isOppSel?color:color}">#${num}</div>
    <div class="pname">${player?player.name:''}</div>`
    :'<div style="color:#56627A;font-size:9px;margin-top:2px">—</div>'}
  </div>`;
}
function hexToRgb(h){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `${r},${g},${b}`;
}

function getDisplayRot(team){
  // フォーメーション機能廃止: 常に現在のローテーションをそのまま返す
  return team==='A'?S.rotA:S.rotB;
}

function renderCourt(){
  const ownRot=getDisplayRot('A');
  const oppRot=getDisplayRot('B');
  const ownRoster=S.rosterA, oppRoster=S.rosterB;
  const oppRows=[[1,6,5],[2,3,4]];
  const ownRows=[[4,3,2],[5,6,1]];

  let oppHTML='';
  oppRows.forEach(row=>{
    oppHTML+='<div class="court-row">';
    row.forEach(pos=>{oppHTML+=courtCellHTML(pos,oppRot[pos],oppRoster,'B',true);});
    oppHTML+='</div>';
  });
  let ownHTML='';
  ownRows.forEach(row=>{
    ownHTML+='<div class="court-row">';
    row.forEach(pos=>{ownHTML+=courtCellHTML(pos,ownRot[pos],ownRoster,'A',false);});
    ownHTML+='</div>';
  });
  document.getElementById('court-opp').innerHTML=oppHTML;
  document.getElementById('court-own').innerHTML=ownHTML;
  document.getElementById('opp-label').textContent='↓ '+S.teamB+'（相手）';
  document.getElementById('own-label').textContent='↑ '+S.teamA+'（自チーム）';
}

function onCellClick(team,num){
  if(!num) return;
  if(!S.serveZoneLocked) return;

  // ── opp selection modes ──
  // SA opp
  if(S.pendAction&&S.pendAction.code==='SA'&&S.pendZone!=null&&S.actorTeam&&team!==S.actorTeam){
    commitAction(S.pendAction,null,S.pendZone,num); return;
  }
  // K/KA/BO/F/B opp — only accept opposite team taps
  if(S.pendAction&&S.pendAction.needsOpp&&!S.oppNum&&S.actorTeam&&team!==S.actorTeam){
    S.oppNum=num; tryCommit(S.pendAction,S.pendSlot,S.pendZone,num); render(); return;
  }
  // SA/S+/S0 → レセプション選手選択（サーブ打った相手チームの選手）
  if(S.pendingOppForServe&&team!==S.pendingOppForServe.team){
    commitServeAction(S.pendingOppForServe.ac,S.pendingOppForServe.zone,num); return;
  }

  // ── actor selection ──
  if(S.pendAction&&S.actorTeam===team) return;
  // 記録モードチェック
  if(S.recordMode==='own'&&team!=='A') return;
  if(S.recordMode==='opp'&&team!=='B') return;

  const rot=getRot(team);
  const posEntry=Object.entries(rot).find(([,v])=>Number(v)===num);
  const posNum=posEntry?Number(posEntry[0]):null;
  const isBackRow=!!(posNum&&[1,5,6].includes(posNum));
  // inRally: true if at least one non-serve action has happened since serve zone was locked
  const inRally=S.serveZoneLocked&&S.inRallyState===true;

  // Select actor and show inline action panel (no popup)
  S.actorTeam=team; S.actorNum=num; S.isBackRow=isBackRow; S.inRally=inRally;
  S.pendAction=null; S.pendSlot=null; S.pendZone=null; S.oppNum=null;
  closePopup();
  render();
}

// Render inline action selector below court
function renderActionPanel(){
  const el=document.getElementById('action-panel');
  const tabs=document.getElementById('tabs');
  const tabContent=document.getElementById('tab-content');
  // Hide if reception grade picker is active
  if(!S.actorNum||S.pendAction){
    el.style.display='none';
    el.classList.remove('open');
    if(tabs) tabs.style.display='';
    if(tabContent) tabContent.style.display='';
    return;
  }
  el.classList.add('open');
  el.style.display='flex';
  // タブを隠してアクションパネルを表示
  if(tabs) tabs.style.display='none';
  if(tabContent) tabContent.style.display='none';
  const team=S.actorTeam, color=colorOf(team);
  const isBackRow=S.isBackRow;
  // serveReceiveOnly(R+A/B/C/MSR)の表示条件:
  // 1. 自チーム(A)の選手であること（相手チームにレセプション評価は不要）
  // 2. 相手チームがサーブ権を持っていること（S.server==='B'）
  // 3. ラリーがまだ始まっていないこと（inRallyState===false）
  // serveReceiveOnly のアクション(R+A/B/C/MSR)はアクションパネルには表示しない
  // レセプション評価はサーブバナー経由（ゾーン→選手→A/B/C/SA）でのみ記録
  const inRally = true; // 常にtrue = serveReceiveOnlyは常に非表示
  const roster=getRoster(team);
  const player=roster.find(p=>p.number===S.actorNum);

  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <div style="color:${color};font-weight:800;font-size:14px">#${S.actorNum} <span style="font-weight:400;font-size:11px;color:#94A3B8">${player?player.name:''}${isBackRow?'<span style="margin-left:5px;font-size:10px;background:rgba('+hexToRgb(color)+',0.2);border-radius:8px;padding:1px 6px;color:'+color+'">後衛</span>':''}</span></div>
    <button onclick="cancelFlow();render()" style="background:transparent;border:1px solid #EF4444;color:#EF4444;border-radius:8px;padding:3px 10px;font-size:11px;cursor:pointer">× 選択解除</button>
  </div>`;

  const side2=S.actorTeam==='A'?'own':'opp';
  const backAttackOn=S.settings[side2].backAttack!==false;
  if(isBackRow&&backAttackOn){
    html+=`<div style="margin-bottom:8px;background:rgba(${hexToRgb(color)},0.08);border-radius:8px;padding:8px;border:1px solid rgba(${hexToRgb(color)},0.3)">
    <div style="font-size:10px;font-weight:700;color:${color};margin-bottom:6px">バックアタック</div>
    <div style="display:flex;gap:5px">`;
    BACK_ATTACK.forEach((ac,bi)=>{
      html+=`<div style="flex:1;padding:10px 4px;border-radius:8px;cursor:pointer;border:1.5px solid ${ac.color};background:rgba(${hexToRgb(ac.color)},0.14);color:${ac.color};font-weight:700;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:1px" onclick="selectBackAttack(${bi})">
        ${ac.code}<small style="font-size:8px;color:#94A3B8;font-weight:400">${ac.label}</small></div>`;
    });
    html+='</div></div>';
  }

  ACTION_GROUPS.forEach(grp=>{
    if(grp==='サーブ') return;
    // レセプション評価グループ(R+A/B/C/MSR)は攻撃・トス等の欄には出さない
    // → 既に serveReceiveOnly で制御されているが、inRally=false の時だけ表示される
    const acts=ACTIONS.filter(a=>{
      if(a.group!==grp) return false;
      if(a.serveReceiveOnly&&inRally) return false;
      if(a.frontOnly&&isBackRow) return false;
      if(a.group==='攻撃'&&isBackRow) return false;
      // 設定によるフィルタ
      const side=S.actorTeam==='A'?'own':'opp';
      const cfg=S.settings[side];
      if(a.group==='レシーブ'&&cfg.reception===false) return false;
      if(a.group==='ブロック'&&cfg.block===false) return false;
      if(a.group==='ディグ'&&cfg.dig===false) return false;
      if(a.group==='トス'&&cfg.toss===false) return false;
      if(a.group==='ミス'&&cfg.misc===false) return false;
      if((a.code==='R+A'||a.code==='R+B'||a.code==='R+C')&&cfg.receptionGrade===false) return false;
      return true;
    });
    if(!acts.length) return;
    html+=`<div style="margin-bottom:7px"><div style="color:#56627A;font-size:9px;font-weight:700;letter-spacing:0.5px;margin-bottom:4px">${grp}</div><div style="display:flex;flex-wrap:wrap;gap:4px">`;
    acts.forEach((ac,_i)=>{
      const idx=ACTIONS.indexOf(ac);
      html+=`<div style="padding:8px 8px;border-radius:8px;cursor:pointer;background:rgba(${hexToRgb(ac.color)},0.14);border:1.5px solid ${ac.color};color:${ac.color};font-weight:700;font-size:12px;line-height:1;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:44px" onclick="selectActionByIdx(${idx})">
        ${ac.code}<small style="font-size:7px;color:#94A3B8;font-weight:400;text-align:center">${ac.label}</small></div>`;
    });
    html+='</div></div>';
  });

  el.innerHTML=html;
}

function selectActionByIdx(idx){S._isBackAttack=false;selectAction(ACTIONS[idx]);}
function selectBackAttack(idx){S._isBackAttack=true;selectAction(BACK_ATTACK[idx]);}
function selectAction(ac){
  S.pendAction=ac; S.pendSlot=null; S.pendZone=null; S.oppNum=null;
  const side=S.actorTeam==='A'?'own':'opp';
  const cfg=S.settings[side];
  // 設定OFFなら対応する入力をスキップ
  const needsSlotNow=ac.needsSlot&&cfg.spikeSlot!==false;
  const needsZoneNow=ac.needsZone&&cfg.spikeZone!==false;
  const needsOppNow=ac.needsOpp&&cfg.killOppSelect!==false;
  if(!needsSlotNow&&!needsZoneNow&&!needsOppNow&&ac.code!=='SA'){
    commitAction(ac,null,null,null);
  } else render();
}

function commitReception(grade){
  const {ac,playerNum,playerName,playerTeam}=S.pendingReception;
  const scoringSide=null; // neutral
  const entry={
    id:Date.now()+Math.random(), team:playerTeam, setNum:S.curSet,
    code:'R+', label:'レセプション', slot:null, zone:null, scoringSide:null, kind:'neutral',
    playerNum, playerName,
    oppPlayerNum:null, oppPlayerName:null,
    receptionGrade:grade, // 'A','B','C'
    serverBefore:S.server, serveZone:S.serveZone,
    ts:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
  };
  S.history.push({rally:JSON.parse(JSON.stringify(S.rally)),rotA:{...S.rotA},rotB:{...S.rotB},server:S.server,serveZone:S.serveZone,serveZoneLocked:S.serveZoneLocked});
  S.rally.push(entry);
  S.pendingReception=null;
  toast((playerTeam==='A'?S.teamA:S.teamB)+(playerNum?' #'+playerNum:'')+ ' R+'+grade);
  cancelFlow(); render();
}

function onSlotTap(s){
  if(!S.pendAction||!S.pendAction.needsSlot||S.pendSlot) return;
  S.pendSlot=s;
  // Don't re-render here — swipe panel handles both slot+zone in one gesture
  // Only commit+render if zone not needed
  if(!S.pendAction.needsZone) tryCommit(S.pendAction,s,null,S.oppNum);
  // If zone IS needed, just store slot and let the gesture continue to zone
}
function onZoneTap(z){
  if(!S.pendAction||!S.pendAction.needsZone) return;
  if(S.pendAction.code==='SA'){S.pendZone=z;render();return;}
  S.pendZone=z;
  tryCommit(S.pendAction,S.pendSlot,z,S.oppNum);
}

// ── Serve Banner ──────────────────────────────────────────────────────
function renderServeBanner(){
  const el=document.getElementById('serve-banner');
  const sa=scoreOf('A'),sb=scoreOf('B');
  if(S.serveZoneLocked||checkSetEnd(sa,sb)){el.style.display='none';return;}
  el.style.display='block';
  const color=colorOf(S.server);
  const rot=getRot(S.server);
  const roster=getRoster(S.server);
  const serverNum=rot[1];
  const serverPlayer=roster.find(p=>p.number===serverNum);
  const zoneLayout=S.server==='B'?ZONE_SERVE_B:ZONE_SERVE_A;
  // サーブゾーン設定: OFF時はゾーン選択をスキップ
  const srvSide=S.server==='A'?'own':'opp';
  const serveZoneOn=S.settings[srvSide].serveZone!==false;
  // ゾーンOFFの場合は即ゾーンを0にセット（スキップ扱い）
  if(!serveZoneOn&&!S.serveZone) S.serveZone='skip';

  let html=`<div class="sb-header">
    <div><div class="sb-title" style="color:${color}">🏐 ${getTeamName(S.server)} サーブ</div>
    ${serverNum?`<div style="color:#94A3B8;font-size:10px">P1サーバー: <span style="color:${color};font-weight:700">#${serverNum}</span>${serverPlayer?' '+serverPlayer.name:''}</div>`:''}</div>
    ${S.serveZone?`<div class="sb-zone-badge" style="background:rgba(${hexToRgb(color)},0.3);border-color:${color}"><div class="sb-zone-lbl">着地</div><div class="sb-zone-num" style="color:${color}">${S.serveZone}</div></div>`
    :`<div style="color:#94A3B8;font-size:10px">← 着地ゾーンをタップ</div>`}
  </div>`;

  if(!S.serveZone){
    html+=`<button class="ms-btn-big" onclick="onServeMiss()">MS <span style="font-size:11px;font-weight:400;color:#94A3B8">サーブミス（ゾーン不要）</span></button>
    <div style="color:#94A3B8;font-size:10px;margin-bottom:5px">サービスエース / 効果サーブ → ゾーンを選択</div>
    <div class="zone-grid">`;
    zoneLayout.forEach(row=>{
      html+='<div class="zone-row">';
      row.forEach(z=>{
        html+=`<div class="zbtn" style="border-color:${color};background:rgba(${hexToRgb(color)},0.1)" onclick="onServeZoneSelect(${z})"><span>${z}</span></div>`;
      });
      html+='</div>';
    });
    html+=`<div style="text-align:center;color:#94A3B8;font-size:8px;margin-top:3px">▼ ネット ▼</div>`;
    html+='</div>';
  } else if(S.server==='A'){
    // 自チームサーブ：ゾーン選択後はSA/S+/S0を右パネル(sa-opp)で処理
    // serve-bannerはゾーン選択のみ担当
    if(S._ownServeSAType){
      // NT/SA選択中はバナーには何も表示しない（sa-oppが担当）
    } else if(S.pendingOppForServe&&S.pendingOppForServe._missSelect){
      // ミス選手選択中も非表示
    } else {
      // ゾーン選択済み → SA/S+/S0選択をsa-oppパネルに委ねる
      // serve-bannerには「結果を右で選択」と表示
      html+=`<div style="color:#94A3B8;font-size:11px;text-align:center;padding:8px">→ 右側でサーブ結果を選択してください</div>`;
    }
  } else {
    // 相手チームサーブ → 評価選択はsa-oppに任せる（serve-bannerには何も表示しない）
  }

  el.innerHTML=html;
  el.style.setProperty('--srv-color',color);
}


// Global serve action arrays for index-based onclick
const SERVE_RES_LIST=[
  {code:'SA',label:'サービスエース',color:'#22C55E',kind:'point'},
  {code:'S+',label:'効果サーブ',color:'#4ade80',kind:'neutral'},
  {code:'S0',label:'普通サーブ',color:'#8896AB',kind:'neutral'},
];
// SA後のミス選手記録してコミット
function commitSAWithMiss(missPlayerNum){
  if(!S.pendingOppForServe) return;
  const {ac,zone}=S.pendingOppForServe;
  const isOwnServe=S.pendingOppForServe._ownServe===true;
  const saType=ac.saType||ac.code;
  const isAce=saType==='SA'||saType==='SA_NT';
  const realAc={
    ...ac,
    code:isAce?'SA':saType,
    receptionGrade:saType,
    kind:isAce?'point':'neutral',
    scoringSide:isAce?(isOwnServe?'A':'B'):null
  };
  commitServeActionWithGrade(realAc,zone,missPlayerNum,null);
}

// 自チームサーブ記録
function commitOwnServe(code){
  S._ownServeSAType=null;
  const zone=S.serveZone;
  const isAce=code==='SA'||code==='SA_NT';

  if(isAce){
    // SA/SA_NT → 相手のミス選手選択へ（任意）
    const ac={code:'SA',label:code==='SA_NT'?'ノータッチエース':'サービスエース',color:'#22C55E',kind:'point',saType:code};
    S.pendingOppForServe={ac,zone,team:'A',_ownServe:true,_missSelect:true,_missTeam:'B'};
    render();
  } else {
    // S+/S0 → 直接記録
    const ac={code,label:code==='S+'?'効果サーブ':'普通サーブ',color:'#4ade80',kind:'neutral'};
    commitServeActionWithGrade(ac,zone,null,null);
  }
}

function onServeActionByIdx(idx,zone){
  const list=[
    {code:'SA',label:'サービスエース',color:'#22C55E',kind:'point'},
    {code:'S+',label:'効果サーブ',color:'#4ade80',kind:'neutral'},
    {code:'S0',label:'普通サーブ',color:'#8896AB',kind:'neutral'},
  ];
  onServeAction(list[idx],zone);
}
function onServeMiss(){onServeAction({code:'MS',label:'サーブミス',color:'#EF4444',kind:'miss'},null);}
function commitPendingServe(oppNum){
  if(!S.pendingOppForServe)return;
  const {ac,zone}=S.pendingOppForServe;
  // ミス選手選択フロー（SA後）
  if(S.pendingOppForServe._missSelect){
    const saType=ac.saType||'SA';
    const realAc={...ac,code:'SA',receptionGrade:saType};
    commitServeActionWithGrade(realAc,zone,oppNum,null);
    return;
  }
  commitServeActionWithGrade(ac,zone,oppNum,null);
}


function commitServeActionWithGrade(ac,zone,oppPlayerNum,recGrade){
  const team=S.server;
  const rot=getRot(team);
  const roster=getRoster(team);
  const oppRoster=getOppRoster(team);
  const serverNum=rot[1];
  const serverName=pName(roster,serverNum);
  const oppName=pName(oppRoster,oppPlayerNum);
  let scoringSide=null;
  if(ac.kind==='point') scoringSide=team;
  else if(ac.kind==='miss') scoringSide=team==='A'?'B':'A';
  const entry={
    id:Date.now()+Math.random(), team, setNum:S.curSet,
    code:ac.code, label:ac.label, slot:null, zone, scoringSide, kind:ac.kind,
    playerNum:serverNum, playerName:serverName,
    oppPlayerNum, oppPlayerName:oppName,
    receptionGrade:recGrade||null,
    serverBefore:S.server, serveZone:zone||S.serveZone,
    ts:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
  };
  S.history.push({rally:JSON.parse(JSON.stringify(S.rally)),rotA:{...S.rotA},rotB:{...S.rotB},server:S.server,serveZone:S.serveZone,serveZoneLocked:S.serveZoneLocked,inRallyState:S.inRallyState});
  S.rally.push(entry);
  S.pendingOppForServe=null;
  saveCurrentMatch();
  if(scoringSide) applyAutoRotation(scoringSide);
  toast((team==='A'?S.teamA:S.teamB)+(serverNum?' #'+serverNum:'')+' '+ac.code+(zone?'→Z'+zone:'')+(recGrade?' R+'+recGrade:''));
  if(scoringSide) startNextRally();
  else{
    S.serveZoneLocked=true;
    // S+/S0 後はラリー継続だが、レセプション選手がまだ選択可能な状態
    // → inRallyState は false のまま（コートアクション後に true になる）
    cancelFlow();
  }
  render();
}

// 相手チームサーブのレセプション評価記録（Vリーグ方式）
// SA_NT=ノータッチエース(×100), SA=サービスエース(×80), C=効果(×25), A/B=効果なし(×0)
function onOppServeRec(grade){
  const zone=S.serveZone;
  S._saTypeSelect=false; // 必ずリセット
  const isAce=grade==='SA'||grade==='SA_NT';
  const ownReceptionOn=S.settings.own.reception!==false;

  if(isAce){
    // SA/SA_NT → 自チームのミス選手選択（任意）
    const ac={code:'SA',label:grade==='SA_NT'?'ノータッチエース':'サービスエース',
      color:'#EF4444',kind:'point',saType:grade,recGrade:grade};
    // _saTypeSelect=falseにしてから_missSelectをセット
    S.pendingOppForServe={ac,zone,team:'B',_ownServe:false,_missSelect:true,_missTeam:'A'};
    render();
  } else if(ownReceptionOn){
    // A/B/C → レセプション選手選択へ
    const recAc={code:'S_REC',label:'レセプション('+grade+')',color:'#3B82F6',kind:'neutral',recGrade:grade};
    S.pendingOppForServe={ac:recAc,zone,team:S.server,_ownServe:false};
    render();
  } else {
    // レセプション記録OFF → 直接記録して継続
    const entry={
      id:Date.now()+Math.random(),team:'B',setNum:S.curSet,
      code:'S_REC',label:'サーブ受け('+grade+')',slot:null,zone,scoringSide:null,kind:'neutral',
      playerNum:null,playerName:null,oppPlayerNum:null,oppPlayerName:null,
      receptionGrade:grade,isBackRow:false,isBackAttack:false,
      serverBefore:S.server,serveZone:zone,
      ts:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
    };
    S.history.push({rally:JSON.parse(JSON.stringify(S.rally)),rotA:{...S.rotA},rotB:{...S.rotB},server:S.server,serveZone:S.serveZone,serveZoneLocked:S.serveZoneLocked,inRallyState:S.inRallyState});
    S.rally.push(entry);
    saveCurrentMatch();
    S.serveZoneLocked=true; render();
  }
}

function onServeZoneSelect(z){
  S.serveZone=z; render();
}

function onServeAction(ac,zone){
  if(ac.code==='MS'){
    // サーブミス：即コミット（選手選択なし）
    commitServeActionWithGrade(ac,zone,null,null);
    return;
  }
  // serveOppSelect設定OFFなら相手レセプション選手選択をスキップ
  const srvSide2=S.server==='A'?'own':'opp';
  if(S.settings[srvSide2].serveOppSelect===false){
    commitServeActionWithGrade(ac,zone||null,null,null);
    return;
  }
  // SA/S+/S0 全て：相手レセプション選手を選択（評価なし）
  S.pendingOppForServe={ac,zone:zone||null,team:S.server,_ownServe:true};
  render();
}

// ── SA Opp Picker ─────────────────────────────────────────────────────
function renderSAOppPicker(){
  const el=document.getElementById('sa-opp');
  if(!el) return;

  // pendingOppForServe（ミス選手選択中）はserveZoneLockedでも表示
  const hasPending=S.pendingOppForServe&&S.pendingOppForServe._missSelect;

  // ゾーン未選択・ロック済みは非表示（ただしミス選手選択中は例外）
  if(!hasPending&&(!S.serveZone||S.serveZoneLocked)){el.style.display='none';return;}
  el.style.display='block';

  // 1. ミス選手選択中
  if(hasPending){
    const {ac}=S.pendingOppForServe;
    const saType=ac.saType||ac.code||'SA';
    const isAce=saType==='SA'||saType==='SA_NT';
    const isOwnServe=S.pendingOppForServe._ownServe===true;
    const missTeam=S.pendingOppForServe._missTeam||(isOwnServe?'B':'A');
    const missRot=getRot(missTeam);
    const missRoster=getRoster(missTeam);
    const onCourt=Object.values(missRot).filter(Boolean);
    const teamLabel=isOwnServe?getTeamName('B'):getTeamName('A');
    const actionLabel=saType==='SA_NT'?'NT':saType==='SA'?'SA':saType;
    el.innerHTML=`<div style="color:${isOwnServe?'#22C55E':'#EF4444'};font-weight:700;font-size:13px;margin-bottom:6px">
      ${actionLabel} — ${teamLabel}の選手（任意）</div>
    <div class="opp-grid">
      ${onCourt.map(num=>{const p=missRoster.find(r=>r.number===num);
        return `<div class="opp-player-btn" onclick="commitSAWithMiss(${num})"><div class="pn">#${num}</div><div class="pnm">${p?p.name:''}</div></div>`;
      }).join('')}
      <button class="skip-btn" onclick="commitSAWithMiss(null)">スキップ</button>
    </div>`;
    return;
  }

  // 2. レセプション選手選択中（A/B/C評価後）
  if(S.pendingOppForServe&&!S.pendingOppForServe._missSelect){
    const {ac}=S.pendingOppForServe;
    const pickerTeam='A'; // 相手サーブ→自チーム選手
    const pickerRot=getRot(pickerTeam);
    const pickerRoster=getRoster(pickerTeam);
    const onCourt=Object.values(pickerRot).filter(Boolean);
    el.innerHTML=`<div style="color:#3B82F6;font-weight:700;font-size:13px;margin-bottom:6px">
      レセプション選手 [${ac.recGrade||''}]</div>
    <div class="opp-grid">
      ${onCourt.map(num=>{const p=pickerRoster.find(r=>r.number===num);
        return `<div class="opp-player-btn" onclick="selectRecPlayerOpp(${num})"><div class="pn">#${num}</div><div class="pnm">${p?p.name:''}</div></div>`;
      }).join('')}
      <button class="skip-btn" onclick="commitPendingServe(null)">スキップ</button>
    </div>`;
    return;
  }

  // 3. サーブ結果選択
  if(S.server==='A'){
    // 自チームサーブ：SA/S+/S0
    if(!S._ownServeSAType){
      el.innerHTML=`<div style="color:#F97316;font-weight:700;font-size:13px;margin-bottom:8px">サーブ結果を選択</div>
      <div style="display:flex;gap:5px">
        <div class="srv-res-btn" style="color:#22C55E;border-color:#22C55E;background:rgba(34,197,94,0.15);font-size:15px;font-weight:900" onclick="S._ownServeSAType='SA';renderSAOppPicker()">SA<small>エース</small></div>
        <div class="srv-res-btn" style="color:#4ade80;border-color:#4ade80;background:rgba(74,222,128,0.15);font-size:15px;font-weight:900" onclick="commitOwnServe('S+')">S+<small>効果</small></div>
        <div class="srv-res-btn" style="color:#8896AB;border-color:#8896AB;background:rgba(136,150,171,0.15);font-size:15px;font-weight:900" onclick="commitOwnServe('S0')">S0<small>普通</small></div>
      </div>
      <button class="other-btn" style="margin-top:8px" onclick="S.serveZoneLocked=true;render()">コートで入力 →</button>`;
    } else {
      el.innerHTML=`<div style="color:#22C55E;font-weight:700;font-size:13px;margin-bottom:8px">SAの種類</div>
      <div style="display:flex;gap:6px">
        <div class="srv-res-btn" style="color:#EF4444;border-color:#EF4444;background:rgba(239,68,68,0.2);font-size:15px;font-weight:900" onclick="commitOwnServe('SA_NT')">NT<small>×100</small></div>
        <div class="srv-res-btn" style="color:#22C55E;border-color:#22C55E;background:rgba(34,197,94,0.2);font-size:15px;font-weight:900" onclick="commitOwnServe('SA')">SA<small>×80</small></div>
      </div>
      <button onclick="S._ownServeSAType=null;renderSAOppPicker()" style="font-size:10px;color:#56627A;background:transparent;border:none;cursor:pointer;margin-top:6px">← 戻る</button>`;
    }
  } else {
    // 相手チームサーブ：A/B/C/SA
    if(!S._saTypeSelect){
      el.innerHTML=`<div style="color:#3B82F6;font-weight:700;font-size:13px;margin-bottom:8px">レセプション評価</div>

function selectRecPlayer(num){

  renderSAOppPicker();
