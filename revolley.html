function selectRecPlayerOpp(num){
  // 相手サーブ時: 評価はac.recGradeに既に入っているので即コミット
  if(!S.pendingOppForServe) return;
  const grade=S.pendingOppForServe.ac.recGrade;
  commitPendingServeWithGrade(num, grade);
}

function commitPendingServeWithGrade(oppNum,grade){
  if(!S.pendingOppForServe)return;
  const {ac,zone}=S.pendingOppForServe;
  // grade='SA'の時はサービスエース扱い（相手得点なし、サーブ側得点）
  if(grade==='SA'){
    // サービスエースとして記録（サーブ打ったチームが得点）
    const aceAc={...ac,code:'SA',kind:'point',label:'サービスエース'};
    commitServeActionWithGrade(aceAc,zone,oppNum,null);
  } else {
    commitServeActionWithGrade(ac,zone,oppNum,grade);
  }
}


// ── Hint ──────────────────────────────────────────────────────────────
function getHintText(){
  if(!S.serveZoneLocked) return S.server==='A'?S.teamA+' サーブ — 着地ゾーンを選択':S.teamB+' サーブ — 着地ゾーンを選択';
  if(S.pendingReception) return 'レセプション評価を選択（A/B/C）';
  if(!S.actorNum) return 'コートの選手をタップ';
  if(!S.pendAction) return `#${S.actorNum} のアクションを選択`;
  const code=S.pendAction.code;
  const oppTeamName=S.actorTeam==='A'?S.teamB:S.teamA;
  if(S.pendAction.needsSlot&&!S.pendSlot) return `#${S.actorNum} ${code} — ② スロット`;
  if(code==='SA'&&S.pendZone==null) return `SA — ③ ゾーンをタップ`;
  if(code==='SA'&&S.pendZone!=null) return `SA Zone${S.pendZone} — レセプションした相手選手をタップ（${oppTeamName}）`;
  if(S.pendAction.needsZone&&(!S.pendAction.needsSlot||S.pendSlot)&&!S.pendZone) return `#${S.actorNum} ${code} — ③ 着地ゾーン`;
  if(S.pendAction.needsOpp&&!S.oppNum){
    if(code==='K') return `K Zone${S.pendZone} — 失点した相手選手をタップ（${oppTeamName}）`;
    if(code==='KA') return `KA Zone${S.pendZone} — ディグした相手選手をタップ（${oppTeamName}）`;
    if(code==='BO') return `BO — ブロックに当てた相手選手をタップ（${oppTeamName}）`;
    if(code==='F') return `F Zone${S.pendZone} — 失点した相手選手をタップ（${oppTeamName}）`;
    if(code==='B') return `B — ブロックした相手スパイカーをタップ（${oppTeamName}）`;
    return `相手選手をタップ（${oppTeamName}）`;
  }
  return '処理中...';
}

function exportPDF(){
  const sa=scoreOf('A'), sb=scoreOf('B');

  const stB=calcStats('B',null);
  const date=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});

  // セット別スコア
  let setScores='';
  for(let i=1;i<=S.curSet;i++){
    const a=scoreOf('A',i), b=scoreOf('B',i);
    if(a+b>0) setScores+=`<tr><td>Set ${i}</td><td style="color:#F97316;font-weight:bold">${a}</td><td>-</td><td style="color:#3B82F6;font-weight:bold">${b}</td><td>${a>b?'○':'●'}</td></tr>`;

  // 選手別スタッツ
  let playerRows='';
  st.players.forEach(p=>{

    const kRate=spT>0?Math.round(((p.K||0)+(p.BO||0))/spT*100)+'%':'—';
    const srvT=(p.SA||0)+(p['S+']||0)+(p.S0||0)+(p.MS||0);
    const sEff=srvT>0?Math.round(((p.SA||0)*100+(p['S+']||0)*25-(p.MS||0)*25)/srvT):'—';
    const recT=(p.recA||0)+(p.recB||0)+(p.recC||0)+(p.MSR||0);
    const aRate=recT>0?Math.round((p.recA||0)/recT*100)+'%':'—';
    playerRows+=`<tr>
      <td>#${p.num} ${p.name}</td>
      <td>${p.K||0}</td><td>${p.KA||0}</td><td>${p.MK||0}</td>

      <td>${p.SA||0}</td><td>${p['S+']||0}</td><td>${p.MS||0}</td>
      <td style="font-weight:bold">${sEff}</td>
      <td>${p.recA||0}/${p.recB||0}/${p.recC||0}</td>
      <td style="font-weight:bold">${aRate}</td>

  // 攻撃ルート上位5
  let routeRows='';
  const allCombos={};
  st.players.forEach(p=>{
    Object.values(p.combo||{}).forEach(cm=>{
      const k=`S${cm.slot}→Z${cm.zone}`;

      allCombos[k].t+=cm.t; allCombos[k].k+=cm.k;
    });
  });
  Object.values(allCombos).sort((a,b)=>b.t-a.t).slice(0,5).forEach((cm,i)=>{
    const killR=cm.t>0?Math.round(cm.k/cm.t*100)+'%':'—';
    routeRows+=`<tr><td>${['🥇','🥈','🥉','4位','5位'][i]}</td><td>スロット ${cm.slot}</td><td>ゾーン ${cm.zone}</td><td>${cm.t}本</td><td>${killR}</td></tr>`;
  });

  // サーブゾーン集計
  let szRows='';
  const szData=st.szr||{};
  Object.entries(szData).filter(([,d])=>d.total>0).sort((a,b)=>b[1].total-a[1].total).forEach(([z,d])=>{
    const eff=d.total>0?Math.round((d.ace+d.effect)/d.total*100)+'%':'—';
    szRows+=`<tr><td>Zone ${z}</td><td>${d.total}</td><td>${d.ace}</td><td>${d.effect}</td><td>${d.neutral||0}</td><td>${d.miss||0}</td><td style="font-weight:bold">${eff}</td></tr>`;

  const win=sa>sb?S.teamA:S.teamB;
  const html=`<!DOCTYPE html>

// ── リベロ機能（インライン・グローバル関数方式）─────────────────────────
function buildLiberoSection(){
  let html='<div style="background:#1A2540;border-radius:12px;padding:12px;margin-bottom:8px;border:2px solid #8B5CF6">';
  html+='<div style="font-weight:700;font-size:13px;color:#8B5CF6;margin-bottom:10px">🟣 リベロ（最大2人）</div>';
  html+='<div style="display:flex;gap:8px;margin-bottom:8px">';
  ['A','B'].forEach(function(t){
    var liberos=getLiberos(t);
    var tName=t==='A'?S.teamA:S.teamB;
    var rot=t==='A'?S.rotA:S.rotB;
    var sw=getLiberoSwaps(t);
    html+='<div style="flex:1;background:#131C30;border-radius:9px;padding:8px;border:1px solid '+(liberos.length?'#8B5CF6':'#2A3A5C')+'">';
    html+='<div style="font-size:9px;color:#56627A;margin-bottom:6px">'+tName+'</div>';
    liberos.forEach(function(lib){
      var roster=t==='A'?S.rosterA:S.rosterB;
      var libP=roster.find(function(r){return r.number===lib;});
      var libOnCourt=Object.values(rot).map(Number).includes(Number(lib));
      var libPos=null;
      Object.entries(rot).forEach(function(e){if(Number(e[1])===Number(lib))libPos=Number(e[0]);});
      var swapPartner=libPos?(sw[libPos]||sw[String(libPos)]):null;
      // もう1人のリベロがコートにいるか
      var otherLib=liberos.find(function(l){return l!==lib;});
      var otherOnCourt=otherLib&&Object.values(rot).map(Number).includes(Number(otherLib));

      // ボタンラベルと動作を決定
      var btnLabel, btnId, btnStyle;
      if(libOnCourt){
        // コートにいる → チェンジで即OUT
        btnLabel='チェンジ ⇄';
        btnId='libero-change-'+t+'-'+lib;
        btnStyle='padding:5px 8px;background:#22C55E;border:none;border-radius:6px;color:#fff;font-size:10px;font-weight:700;cursor:pointer';
      } else if(otherOnCourt){
        // もう1人がコートにいる → タップで即リベロ同士交代
        btnLabel='⇄ 交代';
        btnId='libero-change-'+t+'-'+lib;
        btnStyle='padding:5px 8px;background:#8B5CF6;border:none;border-radius:6px;color:#fff;font-size:10px;font-weight:700;cursor:pointer';
      } else {
        // コート外 → IN（後衛選択パネルを開く）
        btnLabel='IN ▶';
        btnId='libero-change-'+t+'-'+lib;
        btnStyle='padding:5px 8px;background:#8B5CF6;border:none;border-radius:6px;color:#fff;font-size:10px;font-weight:700;cursor:pointer';
      }

      html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">';
      html+='<div style="background:#8B5CF6;color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0">L</div>';
      html+='<div style="flex:1">';
      html+='<div style="color:#8B5CF6;font-weight:800;font-size:13px">#'+lib+' '+(libP?libP.name:'')+'</div>';
      html+='<div style="font-size:9px;color:'+(libOnCourt?'#22C55E':'#94A3B8')+'">'+
        (libOnCourt?'✅ P'+libPos+'にいる':'⭕ コート外')+
        (swapPartner?' → #'+swapPartner+'と戻す':'')+'</div>';
      html+='</div>';
      html+='<button style="'+btnStyle+'" id="'+btnId+'">'+btnLabel+'</button>';
      html+='<button style="padding:4px 6px;background:transparent;border:1px solid #EF4444;border-radius:6px;color:#EF4444;font-size:10px;cursor:pointer" id="libero-remove-'+t+'-'+lib+'">×</button>';
      html+='</div>';
    });
    if(liberos.length<2){
      html+='<button style="width:100%;padding:5px;background:rgba(139,92,246,0.15);border:1px solid #8B5CF6;border-radius:7px;color:#8B5CF6;font-size:11px;font-weight:700;cursor:pointer" id="libero-add-'+t+'">＋ リベロ追加</button>';
    }
    html+='</div>';
  });
  html+='</div>';
  // 詳細パネル（INの場合のみ）
  if(S._liberoOpen){
    html+=buildLiberoDetail(S._liberoOpen.team, S._liberoOpen.lib, S._liberoOpen.mode);
  }
  html+='</div>';
  return html;
}

function buildLiberoDetail(t, libNum, mode){
  var roster=t==='A'?S.rosterA:S.rosterB;
  var rot=t==='A'?S.rotA:S.rotB;
  var sw=getLiberoSwaps(t);
  var libOnCourt=Object.values(rot).includes(libNum);
  var libPos=null;
  Object.entries(rot).forEach(function(e){if(e[1]===libNum)libPos=Number(e[0]);});

  var html='<div style="border-top:1px solid #2A3A5C;padding-top:10px;margin-top:4px">';

  if(mode==='register'){
    // 新規登録：選手選択（既登録リベロは除外）
    const currentLiberos=getLiberos(t).map(Number);
    html+='<div style="font-size:11px;color:#94A3B8;margin-bottom:8px">リベロ選手を選択（Team '+t+'）</div>';
    html+='<div style="display:flex;flex-wrap:wrap;gap:6px">';
    roster.forEach(function(p){
      if(!p.number) return;
      if(currentLiberos.includes(Number(p.number))) return; // 既登録は除外
      html+='<button style="padding:8px 10px;border-radius:8px;border:2px solid #8B5CF6;background:#1A2540;color:#8B5CF6;font-weight:700;cursor:pointer;text-align:center" id="lreg-'+t+'-'+p.number+'">#'+p.number+'<br><span style="font-size:9px;color:#94A3B8;font-weight:400">'+p.name+'</span></button>';
    });
    html+='</div>';
  } else if(libOnCourt){
    // リベロがコート内 → OUTのみ（交代相手固定）
    var partnerNum=sw[libPos]||sw[String(libPos)]||sw[Number(libPos)];
    var partnerP=partnerNum?roster.find(function(r){return r.number===partnerNum;}):null;
    html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">';
    html+='<div style="background:#EF4444;color:#fff;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700">OUT</div>';
    html+='<div style="font-size:11px;font-weight:700">リベロ #'+libNum+' がコートを出ます</div></div>';
    if(partnerNum){
      html+='<div style="font-size:10px;color:#94A3B8;margin-bottom:6px">交代相手（固定）：</div>';
      html+='<button style="padding:10px 16px;border-radius:9px;border:2px solid #22C55E;background:rgba(34,197,94,0.15);color:#22C55E;font-weight:700;cursor:pointer" id="lout-'+t+'-'+libNum+'">';
      html+='#'+partnerNum+' '+(partnerP?partnerP.name:'')+'<br><span style="font-size:9px">P'+libPos+'に戻す</span></button>';
    } else {
      html+='<div style="color:#EF4444;font-size:11px">交代相手が記録されていません</div>';
    }
  } else {
    // リベロがコート外 → IN
    var otherLiberos=getLiberos(t).filter(function(l){return Number(l)!==Number(libNum);});
    var rotNums=Object.values(rot).map(Number);
    var otherLiberoOnCourt=otherLiberos.find(function(l){return rotNums.includes(Number(l));});

    html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">';
    html+='<div style="background:#22C55E;color:#fff;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700">IN</div>';
    html+='<div style="font-size:11px;font-weight:700">リベロ #'+libNum+' がコートに入ります</div></div>';

    if(otherLiberoOnCourt){
      // もう1人のリベロがコート内 → リベロ同士の交代のみ
      var otherPos=null;
      Object.entries(rot).forEach(function(e){if(Number(e[1])===Number(otherLiberoOnCourt))otherPos=Number(e[0]);});
      html+='<div style="font-size:10px;color:#EAB308;margin-bottom:8px">⚠️ リベロ #'+otherLiberoOnCourt+' がコート内 → リベロ同士交代</div>';
      html+='<button style="width:100%;padding:10px;border-radius:9px;border:2px solid #8B5CF6;background:rgba(139,92,246,0.15);color:#8B5CF6;font-weight:700;cursor:pointer;font-size:12px" id="lin-'+t+'-'+libNum+'-'+otherPos+'-'+otherLiberoOnCourt+'">';
      html+='🟣 リベロ #'+otherLiberoOnCourt+' ↔ リベロ #'+libNum+'<br><span style="font-size:9px;color:#94A3B8">P'+otherPos+'で交代</span></button>';
    } else {
      // 通常のIN（後衛選手と交代）
      var liberoNums=getLiberos(t).map(Number);
      html+='<div style="font-size:10px;color:#94A3B8;margin-bottom:6px">後衛（P5/P6/P1）の選手と交代：</div>';
      html+='<div style="display:flex;gap:6px">';
      var hasAny=false;
      [5,6,1].forEach(function(pos){
        var num=rot[pos];
        if(!num) return;
        if(Number(num)===Number(libNum)) return;
        // そのポジションに別のリベロがいる場合は除外
        if(liberoNums.includes(Number(num))) return;
        var p=roster.find(function(r){return Number(r.number)===Number(num);});
        var swVal=sw[pos]||sw[String(pos)]||sw[Number(pos)];
        // swapが設定されていても、それが「元の選手=今そこにいる選手」なら前回の相手として表示
        var isRec=swVal&&Number(swVal)===Number(num);
        hasAny=true;
        html+='<button style="flex:1;padding:8px 4px;border-radius:8px;border:2px solid '+(isRec?'#22C55E':'#F97316')+';background:'+(isRec?'rgba(34,197,94,0.15)':'rgba(249,115,22,0.1)')+';color:'+(isRec?'#22C55E':'#F97316')+';font-weight:700;cursor:pointer;font-size:11px" id="lin-'+t+'-'+libNum+'-'+pos+'-'+num+'">';
        html+='P'+pos+'<br>#'+num+'<br><span style="font-size:9px;color:#94A3B8">'+(p?p.name:'')+'</span>'+(isRec?'<br><span style="font-size:8px">⭐前回</span>':'');
        html+='</button>';
      });
      if(!hasAny) html+='<div style="color:#56627A;font-size:11px">後衛に入れる選手がいません</div>';
      html+='</div>';
    }
  }
  html+='<button style="width:100%;margin-top:8px;padding:5px;background:transparent;border:1px solid #2A3A5C;border-radius:7px;color:#56627A;font-size:10px;cursor:pointer" id="libero-close-btn">閉じる</button>';
  html+='</div>';
  return html;
}

function bindLiberoInRot(){
  ['A','B'].forEach(function(t){
    var roster=t==='A'?S.rosterA:S.rosterB;
    var rot=t==='A'?S.rotA:S.rotB;
    var liberos=getLiberos(t);
    var sw=getLiberoSwaps(t);

    // 追加ボタン
    var addBtn=document.getElementById('libero-add-'+t);
    if(addBtn) addBtn.addEventListener('click',function(){
      var currentLiberos=getLiberos(t);
      var idx=currentLiberos.length; // 0=1人目, 1=2人目
      S._liberoOpen={team:t,lib:null,mode:'register',idx:idx};
      renderRight();
    });

    // 登録選手選択（lreg-ボタン）
    roster.forEach(function(p){
      var el=document.getElementById('lreg-'+t+'-'+p.number);
      if(el) el.addEventListener('click',function(){
        var idx=(S._liberoOpen&&S._liberoOpen.idx!=null)?S._liberoOpen.idx:getLiberos(t).length;
        setLibero(t,idx,Number(p.number));
        S._liberoOpen=null;
        saveToLS(); renderRight();
      });
    });

    // チェンジボタン（状況に応じて即実行）
    liberos.forEach(function(lib){
      var changeBtn=document.getElementById('libero-change-'+t+'-'+lib);
      if(changeBtn) changeBtn.addEventListener('click',function(){
        var rot=t==='A'?S.rotA:S.rotB;
        var libOnCourt=Object.values(rot).map(Number).includes(Number(lib));
        var otherLib=liberos.find(function(l){return l!==lib;});
        var otherOnCourt=otherLib&&Object.values(rot).map(Number).includes(Number(otherLib));

        if(libOnCourt){
          // コートにいる → 即OUT
          doLiberoOut(t,Number(lib));
        } else if(otherOnCourt){
          // もう1人がコートにいる → 即リベロ同士交代
          var otherPos=null;
          Object.entries(rot).forEach(function(e){if(Number(e[1])===Number(otherLib))otherPos=Number(e[0]);});
          if(otherPos) doLiberoIn(t,Number(lib),otherPos,Number(otherLib));
        } else {
          // コート外・通常IN → 後衛選択パネルを開く
          if(S._liberoOpen&&S._liberoOpen.lib===lib&&S._liberoOpen.team===t){
            S._liberoOpen=null;
          } else {
            S._liberoOpen={team:t,lib:lib,mode:'change'};
          }
          renderRight();
        }
      });
      // 削除ボタン
      var removeBtn=document.getElementById('libero-remove-'+t+'-'+lib);
      if(removeBtn) removeBtn.addEventListener('click',function(){
        removeLibero(t,lib);
        S._liberoOpen=null;
        saveToLS(); renderRight();
      });
    });

    // OUTボタン
    liberos.forEach(function(lib){
      var el=document.getElementById('lout-'+t+'-'+lib);
      if(el) el.addEventListener('click',function(){
        doLiberoOut(t,lib);
      });
    });

    // INボタン
    liberos.forEach(function(lib){
      [5,6,1].forEach(function(pos){
        var num=rot[pos];
        if(!num) return;
        var el=document.getElementById('lin-'+t+'-'+lib+'-'+pos+'-'+num);
        if(el) el.addEventListener('click',function(){
          doLiberoIn(t,Number(lib),pos,Number(num));
        });
      });
      // リベロ同士交代ボタン（lin-t-lib-pos-otherLib形式）
      var otherLibs=liberos.filter(function(l){return Number(l)!==Number(lib);});
      otherLibs.forEach(function(otherLib){
        var otherPos=null;
        Object.entries(rot).forEach(function(e){if(Number(e[1])===Number(otherLib))otherPos=Number(e[0]);});
        if(!otherPos) return;
        var el=document.getElementById('lin-'+t+'-'+lib+'-'+otherPos+'-'+otherLib);
        if(el) el.addEventListener('click',function(){
          doLiberoIn(t,Number(lib),otherPos,Number(otherLib));
        });
      });
    });
  });

  // 閉じるボタン
  var cl=document.getElementById('libero-close-btn');
  if(cl) cl.addEventListener('click',function(){
    S._liberoOpen=null; renderRight();
  });
}

// ── 累計データ計算 ───────────────────────────────────────────────────
function calcPlayerCareer(){
  // 全試合のrallyを結合して選手別累計を計算
  const allRally=[];
  S.matches.forEach(m=>{if(m.rally)allRally.push(...m.rally);});
  // 現在の試合も含める
  allRally.push(...S.rally);

  const players={};
  allRally.forEach(r=>{
    if(r.team!=='A') return; // 自チームのみ
    const k=r.playerNum||0;
    if(!k) return;
    if(!players[k]){
      players[k]={num:k,name:r.playerName||'#'+k,
        K:0,KA:0,BO:0,MK:0,F:0,B:0,SA:0,'S+':0,S0:0,MS:0,
        recA:0,recB:0,recC:0,recMiss:0,pts:0,matches:new Set()};
    }
    const p=players[k];
    if(r.code==='R+'&&r.receptionGrade==='A') p.recA++;
    else if(r.code==='R+'&&r.receptionGrade==='B') p.recB++;
    else if(r.code==='R+'&&r.receptionGrade==='C') p.recC++;
    else if(r.code==='MSR') p.recMiss++;
    if(p[r.code]!==undefined) p[r.code]++;
    if(r.scoringSide==='A') p.pts++;
    if(r.setNum) p.matches.add((r.serverBefore||'')+r.setNum+(r.ts||'').slice(0,5));
  });

  return Object.values(players).map(p=>{
    const spTotal=(p.K||0)+(p.KA||0)+(p.MK||0)+(p.BO||0);
    const killRate=spTotal>0?Math.round(((p.K||0)+(p.BO||0))/spTotal*100):null;
    const srvTotal=(p.SA||0)+(p['S+'||0])+(p.S0||0)+(p.MS||0);
    const serveEff=srvTotal>0?Math.round(((p.SA||0)*100+(p['S+'||0])*25-(p.MS||0)*25)/srvTotal):null;
    const recTotal=(p.recA||0)+(p.recB||0)+(p.recC||0)+(p.recMiss||0);
    return {...p,spTotal,killRate,serveEff,recTotal};
  }).sort((a,b)=>b.pts-a.pts);
}

function calcMatchHistory(){
  return S.matches.map(m=>{
    const rally=m.rally||[];
    const scoreA=rally.filter(r=>r.scoringSide==='A').length;
    const scoreB=rally.filter(r=>r.scoringSide==='B').length;
    const kills=rally.filter(r=>r.team==='A'&&['K','BO','F'].includes(r.code)).length;
    const spikes=rally.filter(r=>r.team==='A'&&['K','KA','MK','BO'].includes(r.code)).length;
    const sas=rally.filter(r=>r.team==='A'&&r.code==='SA').length;
    const mss=rally.filter(r=>r.team==='A'&&r.code==='MS').length;
    const sps=rally.filter(r=>r.team==='A'&&r.code==='S+').length;
    const srvTotal=sas+mss+sps+rally.filter(r=>r.team==='A'&&r.code==='S0').length;
    // 相手チームサーブ効果率（自チームのレセプション評価から計算）
    const recEntries=rally.filter(r=>r.code==='S_REC'&&r.receptionGrade);
    const oppSrvTotal=recEntries.length;
    return {
      ...m, scoreA, scoreB,
      killRate:spikes>0?Math.round(kills/spikes*100):null,
      serveEff:srvTotal>0?Math.round((sas*100+sps*25-mss*25)/srvTotal):null,
    };
  });
}

function calcOppTeamStats(oppTeamId){
  const ms=S.matches.filter(m=>m.oppTeamId===oppTeamId);
  if(!ms.length) return null;
  const wins=ms.filter(m=>m.result==='W').length;
  const allRally=[];
  ms.forEach(m=>{if(m.rally)allRally.push(...m.rally);});
  const oppKills=allRally.filter(r=>r.team==='B'&&['K','BO','F'].includes(r.code)).length;
  const oppSpikes=allRally.filter(r=>r.team==='B'&&['K','KA','MK','BO'].includes(r.code)).length;
  const oppSAs=allRally.filter(r=>r.team==='B'&&r.code==='SA').length;
  const oppMSs=allRally.filter(r=>r.team==='B'&&r.code==='MS').length;
  const oppSPs=allRally.filter(r=>r.team==='B'&&r.code==='S+').length;
  const oppSrvTotal=oppSAs+oppMSs+oppSPs+allRally.filter(r=>r.team==='B'&&r.code==='S0').length;
  return {
    games:ms.length, wins, losses:ms.length-wins,
    winRate:Math.round(wins/ms.length*100),
    oppKillRate:oppSpikes>0?Math.round(oppKills/oppSpikes*100):null,
    oppServeEff:oppSrvTotal>0?Math.round((oppSAs*100+oppSPs*25-oppMSs*25)/oppSrvTotal):null,
  };
}

function renderMatchHistory(){
  const matches=calcMatchHistory();
  if(!matches.length) return '<div style="color:#56627A;text-align:center;padding:30px;font-size:12px">試合データがありません<br>試合を記録すると履歴が表示されます</div>';

  const wins=matches.filter(m=>m.result==='W').length;
  let html=`<div style="background:#1A2540;border-radius:10px;padding:10px;margin-bottom:10px;display:flex;gap:12px;text-align:center">
    <div style="flex:1"><div style="font-size:22px;font-weight:900;color:#22C55E">${wins}</div><div style="font-size:9px;color:#56627A">勝利</div></div>
    <div style="flex:1"><div style="font-size:22px;font-weight:900;color:#EF4444">${matches.length-wins}</div><div style="font-size:9px;color:#56627A">敗戦</div></div>
    <div style="flex:1"><div style="font-size:22px;font-weight:900;color:#F97316">${matches.length>0?Math.round(wins/matches.length*100):0}%</div><div style="font-size:9px;color:#56627A">勝率</div></div>
  </div>`;

  // 日付ごとにグループ化
  const groups={};
  matches.forEach((m,mi)=>{
    const date=m.date||'日付不明';
    if(!groups[date]) groups[date]=[];
    groups[date].push({...m,_mi:mi});
  });

  const expandedDates=S._expandedDates||{};

  Object.entries(groups).forEach(([date,dayMatches])=>{
    const dayWins=dayMatches.filter(m=>m.result==='W').length;
    const isExpanded=expandedDates[date]!==false; // デフォルトは開いた状態
    const dateId='date-'+date.replace(/\//g,'-');

    html+=`<div style="margin-bottom:8px">
      <!-- 日付ヘッダー -->
      <div onclick="toggleDateGroup('${date}')" style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#12182A;border-radius:${isExpanded?'10px 10px 0 0':'10px'};cursor:pointer;border:1px solid #2A3A5C">
        <div style="font-size:13px;font-weight:800;color:#F1F5F9">${date}</div>
        <div style="font-size:10px;color:#56627A">${dayMatches.length}試合</div>
        <div style="display:flex;gap:4px;margin-left:4px">
          <span style="color:#22C55E;font-size:10px;font-weight:700">${dayWins}勝</span>
          <span style="color:#56627A;font-size:10px">/</span>
          <span style="color:#EF4444;font-size:10px;font-weight:700">${dayMatches.length-dayWins}敗</span>
        </div>
        <div style="flex:1"></div>
        <div style="color:#56627A;font-size:14px">${isExpanded?'▲':'▼'}</div>
      </div>`;

    if(isExpanded){
      html+=`<div style="border:1px solid #2A3A5C;border-top:none;border-radius:0 0 10px 10px;overflow:hidden">`;
      dayMatches.forEach((m,di)=>{
        const isW=m.result==='W';
        const realIdx=S.matches.findIndex(sm=>sm.id===m.id);
        html+=`<div style="padding:10px 12px;${di<dayMatches.length-1?'border-bottom:1px solid #1A2540':''}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <div style="font-weight:700;font-size:13px;flex:1">vs ${m.oppTeamName}</div>
            <div style="font-weight:900;font-size:14px;color:${isW?'#22C55E':'#EF4444'}">${isW?'WIN':'LOSE'}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="font-size:22px;font-weight:900;color:#F97316">${m.scoreA}</div>
            <div style="color:#56627A;font-size:14px">—</div>
            <div style="font-size:22px;font-weight:900;color:#3B82F6">${m.scoreB}</div>
            <div style="flex:1"></div>
            ${m.killRate!=null?`<div style="background:#131C30;border-radius:6px;padding:3px 6px;font-size:9px">決定率 <span style="color:#F97316;font-weight:700">${m.killRate}%</span></div>`:''}
          </div>
          <div style="display:flex;gap:6px;margin-top:6px">
            <button onclick="loadMatch(${realIdx})" style="flex:1;padding:7px;background:#3B82F6;border:none;color:#fff;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer">📊 分析</button>
            <button onclick="if(confirm('削除しますか？')){S.matches.splice(${realIdx},1);saveToLS();renderRight()}" style="padding:6px 10px;background:transparent;border:1px solid #EF4444;color:#EF4444;border-radius:7px;font-size:10px;cursor:pointer">×</button>
          </div>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });

  return html;
}

// ── Unified Swipe Panel (slot → zone in one gesture) ─────────────────
// KEY DESIGN: slot row + zone grid are ALWAYS shown together when both needed.
// A single finger gesture covers both regions. Finger lifts = commit both.
// render() is NEVER called mid-gesture — the DOM stays stable.

let _sp={slot:null,zone:null,active:false};

function renderSlotStrip(){renderSwipePanel();}
function renderActionZone(){renderSwipePanel();}

function renderSwipePanel(){
  const el=document.getElementById('swipe-panel');
  if(!el) return;
  const ac=S.pendAction;
  if(!ac){el.style.display='none';el.classList.remove('open');return;}

  const side=S.actorTeam==='A'?'own':'opp';
  const needsSlot=ac.needsSlot&&!S.pendSlot;
  const needsZone=ac.needsZone&&!S.pendZone&&ac.code!=='SA';
  const needsSAZone=ac.code==='SA'&&!S.pendZone&&(!ac.needsSlot||S.pendSlot);

  if(!needsSlot&&!needsZone&&!needsSAZone){el.style.display='none';return;}

  // Auto-skip if settings off
  if(needsSlot&&S.settings[side].spikeSlot===false) S.pendSlot='—';
  if(needsZone&&S.settings[side].spikeZone===false) S.pendZone='skip';
  // Re-check after auto-skip
  const showSlot=ac.needsSlot&&!S.pendSlot;
  const showZone=ac.needsZone===true&&S.pendZone==null&&ac.code!=='SA';
  if(!showSlot&&!showZone){
    // Both done — commit with null zone if skipped
    const slotVal=S.pendSlot==='—'?null:S.pendSlot;
    const zoneVal=S.pendZone==='skip'?null:S.pendZone;
    tryCommit(ac,slotVal,zoneVal,S.oppNum);
    render();
    return;
  }

  _sp={slot:null,zone:null,active:false};
  const color=colorOf(S.actorTeam||'A');
  const slots=S.actorTeam==='B'?SLOTS_B:SLOTS_A;
  const zLayout=S.actorTeam==='B'?ZONE_DEF:ZONE_ATK;

  let lbl='';
  const isOppTeam=S.actorTeam==='B';
  if(showSlot&&showZone) lbl=isOppTeam?'上のスロット→下のゾーンへなぞって離す':'下のスロット→上のゾーンへなぞって離す';
  else if(showSlot) lbl='スロットをなぞって選択';
  else lbl=ac.needsSlot?`ゾーンを選択（Slot ${S.pendSlot}）`:'ゾーンを選択';

  el.classList.add('open');
  el.style.display='block';
  el.style.borderTop=`2px solid ${color}`;
  el.style.padding='12px 12px 24px';
  el.style.background='#0d1420';
  el.style.touchAction='none';
  el.style.userSelect='none';
  el.style.position='fixed';

  let html=`<div style="font-size:10px;font-weight:700;color:${color};margin-bottom:8px">${lbl}</div>`;

  // 相手チーム(B)はスロット上・ゾーン下、自チーム(A)はゾーン上・スロット下
  if(isOppTeam){
    // ── 相手チーム: スロット帯を上に ──
    if(showSlot){
      html+=`<div style="text-align:center;color:#56627A;font-size:8px;margin-bottom:3px">▲ スロット（相手の打った位置）</div>`;
      html+=`<div id="sp-slots" style="display:flex;border-radius:8px;overflow:hidden;height:52px;margin-bottom:8px">`;
      slots.forEach(s=>{
        const isZero=s==='0';
        html+=`<div data-slot="${s}" style="flex:1;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#1a1208;background:${isZero?'#4a8c2a':'rgba(232,151,58,0.92)'};border-right:1px solid rgba(0,0,0,0.1)">${s}</div>`;
      });
      html+=`</div>`;
      html+=`<div style="text-align:center;color:#56627A;font-size:8px;margin-bottom:6px">← C B A 0 1 2 3 4 5</div>`;
    }
    // ゾーングリッドを下に
    if(showZone){
      html+=`<div style="text-align:center;color:#56627A;font-size:8px;margin-bottom:3px">▼ ゾーン（着地点）▼ ネット ▼</div>`;
      html+=`<div id="sp-zones">`;
      zLayout.forEach(row=>{
        html+=`<div style="display:flex;gap:3px;margin-bottom:3px">`;
        row.forEach(z=>{

        });

      });

    }
    // スロット帯を下に
    if(showSlot){
      html+=`<div style="text-align:center;color:#56627A;font-size:8px;margin-bottom:3px">▼ スロット（自分の打った位置）</div>`;

      });
      html+=`</div>`;
      html+=`<div style="text-align:center;color:#56627A;font-size:8px;margin-top:2px">← 5 4 3 2 1 0 A B C</div>`;
    }
  }

  // Finger indicator
  html+=`<div id="sp-dot" style="position:absolute;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.35);border:2px solid #fff;pointer-events:none;display:none;transform:translate(-50%,-50%);z-index:10"></div>`;
  html+=`<div style="text-align:center;font-size:9px;color:#56627A;margin-top:6px">${showSlot&&showZone?'スロット帯から指を置き、上のゾーンへなぞって離す':'なぞって離して確定'}</div>`;


  el.innerHTML=html;
  requestAnimationFrame(()=>_attachSwipe(el,showSlot,showZone,color));
}

function _attachSwipe(el,showSlot,showZone,color){
  const dot=document.getElementById('sp-dot');

  function moveDot(x,y){
    if(!dot) return;
    const r=el.getBoundingClientRect();
    dot.style.left=(x-r.left)+'px';
    dot.style.top=(y-r.top)+'px';
    dot.style.display='block';
  }

  function hitSlot(x,y){
    const slots=el.querySelectorAll('[data-slot]');
    for(const c of slots){
      const r=c.getBoundingClientRect();
      if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom) return c.dataset.slot;
    }
    return null;
  }

  function hitZone(x,y){
    const cells=el.querySelectorAll('[data-zone]');
    for(const c of cells){
      const r=c.getBoundingClientRect();
      if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom) return Number(c.dataset.zone);
    }
    return null;
  }

  function applySlotHL(s){
    el.querySelectorAll('[data-slot]').forEach(c=>{
      const on=c.dataset.slot===s;
      c.style.background=on?color:(c.dataset.slot==='0'?'#4a8c2a':'rgba(232,151,58,0.92)');
      c.style.color=on?'#fff':'#1a1208';
      c.style.boxShadow=on?'inset 0 0 0 3px rgba(255,255,255,0.6)':'';
    });
  }

  function applyZoneHL(z){
    el.querySelectorAll('[data-zone]').forEach(c=>{
      const on=Number(c.dataset.zone)===z;
      c.style.background=on?'#22C55E':'rgba(232,151,58,0.88)';
      c.style.color=on?'#fff':'#1a1208';
      const span=c.querySelector('span');
      if(span){span.style.borderColor=on?'#fff':'#1a1208';span.style.color=on?'#fff':'#1a1208';}
    });
  }

  function onMove(e){
    e.preventDefault();
    const t=e.touches?e.touches[0]:e;
    moveDot(t.clientX,t.clientY);
    if(showSlot){const s=hitSlot(t.clientX,t.clientY);if(s){_sp.slot=s;applySlotHL(s);}}
    if(showZone){const z=hitZone(t.clientX,t.clientY);if(z){_sp.zone=z;applyZoneHL(z);}}
  }

  function onStart(e){
    e.preventDefault();
    _sp.active=true;
    if(dot) dot.style.display='block';
    const t=e.touches?e.touches[0]:e;
    moveDot(t.clientX,t.clientY);
    if(showSlot){const s=hitSlot(t.clientX,t.clientY);if(s){_sp.slot=s;applySlotHL(s);}}
    if(showZone){const z=hitZone(t.clientX,t.clientY);if(z){_sp.zone=z;applyZoneHL(z);}}
  }

  function onEnd(e){
    e.preventDefault();
    _sp.active=false;
    if(dot) dot.style.display='none';
    // スナップショット: onEnd時点のアクションを保存（render()で消えないように）
    const ac=S.pendAction;
    if(!ac) return; // アクションが既にない場合は無視
    const t=e.changedTouches?e.changedTouches[0]:e;
    if(showSlot){const s=hitSlot(t.clientX,t.clientY);if(s) _sp.slot=s;}
    if(showZone){const z=hitZone(t.clientX,t.clientY);if(z) _sp.zone=z;}

    const slot=_sp.slot, zone=_sp.zone;
    _sp={slot:null,zone:null,active:false};

    if(showSlot&&slot) S.pendSlot=slot;
    if(showZone&&zone) S.pendZone=zone;
    const slotVal=S.pendSlot&&S.pendSlot!=='—'?S.pendSlot:null;
    const zoneVal=showZone&&S.pendZone&&S.pendZone!=='skip'?S.pendZone:null;
    // needsZone=falseのアクション(MK等)はzone=null固定
    const finalZone=(ac.needsZone===true)?zoneVal:null;
    tryCommit(ac,slotVal,finalZone,S.oppNum);
    render();
  }

  el.addEventListener('touchstart',onStart,{passive:false});
  el.addEventListener('touchmove',onMove,{passive:false});
  el.addEventListener('touchend',onEnd,{passive:false});
  let md=false;
  el.addEventListener('mousedown',e=>{md=true;onStart(e);});
  document.addEventListener('mousemove',e=>{if(md)onMove(e);});
  document.addEventListener('mouseup',e=>{if(md){md=false;onEnd(e);}});
}

// ── Stats ─────────────────────────────────────────────────────────────
function calcStats(team,setNum){
  const rows=S.rally.filter(r=>r.team===team&&(setNum==null||r.setNum===setNum));
  // スパイク・フェイント両方を分母に含める
  const spikes=rows.filter(r=>['K','KA','MK','BO','F','MF'].includes(r.code));
  const kill=rows.filter(r=>['K','BO','F'].includes(r.code)).length;
  const sTotal=spikes.length;
  const serves=rows.filter(r=>r.code==='SA').length;
  const sMiss=rows.filter(r=>r.code==='MS').length;
  // 自チームサーブ効果率（Vリーグ方式）
  // ノータッチエース×100 + サービスエース×80 + 効果×25 ÷ 打数
  // 自チームの場合: SA_NT×100 + SA×80 + S+×25 ÷ 総本数
  const saNT=rows.filter(r=>r.code==='SA'&&r.receptionGrade==='SA_NT').length;
  const saNormal=rows.filter(r=>r.code==='SA'&&r.receptionGrade!=='SA_NT').length;
  const sEffect=rows.filter(r=>r.code==='S+').length;
  const sTotalCount=rows.filter(r=>['SA','S+','S0','MS'].includes(r.code)).length;
  const serveEffRate=sTotalCount>0
    ? Math.round((saNT*100 + saNormal*80 + sEffect*25)/sTotalCount)
    : null;
  const pts=rows.filter(r=>r.scoringSide===team).length;
  // ── スパイクゾーン（r.zone）── サーブゾーンとは別集計
  const spikeZoneAll={},spikeZoneKill={},slotAll={},slotKill={};
  [1,2,3,4,5,6,7,8,9].forEach(z=>{spikeZoneAll[z]=0;spikeZoneKill[z]=0;});
  [...SLOTS_A].forEach(s=>{slotAll[s]=0;slotKill[s]=0;});
  rows.forEach(r=>{
    // スパイク着地ゾーン（K/KA/BO/F のみ）
    if(['K','KA','BO','F'].includes(r.code)&&r.zone&&spikeZoneAll[r.zone]!==undefined){
      spikeZoneAll[r.zone]++;
      if(['K','BO','F'].includes(r.code))spikeZoneKill[r.zone]++;
    }
    if(r.slot&&slotAll[r.slot]!==undefined){slotAll[r.slot]++;if(['K','BO','F'].includes(r.code))slotKill[r.slot]++;}
  });
  // compat aliases
  const zoneAll=spikeZoneAll, zoneKill=spikeZoneKill;
  // reception grades
  const recTotal=rows.filter(r=>r.code==='R+'||r.code==='MSR').length;
  const recA=rows.filter(r=>r.code==='R+'&&r.receptionGrade==='A').length;
  const recB=rows.filter(r=>r.code==='R+'&&r.receptionGrade==='B').length;
  const recC=rows.filter(r=>r.code==='R+'&&r.receptionGrade==='C').length;
  const recMiss=rows.filter(r=>r.code==='MSR').length;

  // player combo + reception
  const playerMap={};
  rows.forEach(r=>{
    const k=r.playerNum||0;
    if(!playerMap[k])playerMap[k]={num:k,name:r.playerName||'—',K:0,KA:0,BO:0,MK:0,F:0,B:0,SA:0,'S+':0,S0:0,MS:0,M:0,MD:0,MSR:0,'R+':0,recA:0,recB:0,recC:0,pts:0,serveEffRate:null,combo:{},slotZone:{}};
    const p=playerMap[k];
    if(p[r.code]!==undefined)p[r.code]++;
    if(r.scoringSide===team)p.pts++;
    if(r.code==='R+'){
      if(r.receptionGrade==='A')p.recA++;
      else if(r.receptionGrade==='B')p.recB++;
      else if(r.receptionGrade==='C')p.recC++;
    }
    if(['K','KA','BO','F'].includes(r.code)&&r.slot&&r.zone){
      const ck=`${r.slot}-${r.zone}`;
      if(!p.combo[ck])p.combo[ck]={slot:r.slot,zone:r.zone,t:0,k:0};
      p.combo[ck].t++;
      if(['K','BO','F'].includes(r.code))p.combo[ck].k++;
      // slot percentage
      if(!p.slotZone[r.slot])p.slotZone[r.slot]={};
      if(!p.slotZone[r.slot][r.zone])p.slotZone[r.slot][r.zone]={t:0,k:0};
      p.slotZone[r.slot][r.zone].t++;
      if(['K','BO','F'].includes(r.code))p.slotZone[r.slot][r.zone].k++;
    }
  });
  // serve zone result
  const szr={};
  [1,2,3,4,5,6,7,8,9].forEach(z=>{szr[z]={total:0,ace:0,effect:0,neutral:0,miss:0};});
  rows.filter(r=>r.serveZone&&['SA','S+','S0','MS'].includes(r.code)).forEach(r=>{
    const z=r.serveZone;
    if(!szr[z])return;
    szr[z].total++;
    if(r.code==='SA')szr[z].ace++;
    else if(r.code==='S+')szr[z].effect++;
    else if(r.code==='S0')szr[z].neutral++;
    else if(r.code==='MS')szr[z].miss++;
  });
  // 選手別サーブ効果率
  Object.values(playerMap).forEach(p=>{
    const tot=(p.SA||0)+(p['S+']||0)+(p.S0||0)+(p.MS||0);
    p.serveEffRate=tot>0?Math.round(((p.SA||0)*100+(p['S+']||0)*25-(p.MS||0)*25)/tot):null;
    p.serveTot=tot;
  });
  return{kill,sTotal,serves,sMiss,sEffect,sTotalCount,serveEffRate,serveTotal:serves+sMiss,pts,zoneAll,zoneKill,slotAll,slotKill,
    killPct:pct(kill,sTotal),serveEff:serves-sMiss,
    recTotal,recA,recB,recC,recMiss,
    players:Object.values(playerMap).sort((a,b)=>Number(a.num)-Number(b.num)),szr};
}

  let aArr=[],bArr=[],a=0,b=0;
  scored.forEach(r=>{if(r.scoringSide==='A')a++;else b++;aArr.push(a);bArr.push(b);});
  let rsHtml=`<div class="stat-card"><h3>ランニングスコア Set ${S.curSet}</h3>
  <div id="running-score">
  <div class="rs-header">
    <div class="rs-h" style="background:rgba(249,115,22,0.13);color:#F97316">${S.teamA}</div>

    <div class="rs-h" style="background:rgba(59,130,246,0.13);color:#3B82F6">${S.teamB}</div>
  </div>`;
  scored.forEach((entry,i)=>{
    const isA=entry.scoringSide==='A';

    rsHtml+=`<div class="rs-row">
      <div class="rs-cell" style="${isA?'background:rgba(249,115,22,0.22);border-color:rgba(249,115,22,0.7);color:#F97316':'border-color:#2A3A5C;color:#56627A'}">${isA?aArr[i]:''}</div>

      <div class="rs-cell" style="${!isA?'background:rgba(59,130,246,0.22);border-color:rgba(59,130,246,0.7);color:#3B82F6':'border-color:#2A3A5C;color:#56627A'}">${!isA?bArr[i]:''}</div>
    </div>`;
  });
  if(!scored.length) rsHtml+='<div style="color:#56627A;font-size:11px;text-align:center;padding:10px">得点を記録すると表示されます</div>';
  rsHtml+=`<div class="rs-total"><span style="color:#F97316">${a}</span><span style="color:#56627A;font-size:9px">計</span><span style="color:#3B82F6">${b}</span></div>
  </div></div>`;

  // Event log

  const sorted=[...rows].reverse();
  if(!sorted.length) logHtml+='<div style="color:#56627A;font-size:11px;text-align:center;padding:16px">まだ記録なし</div>';
  sorted.forEach(r=>{

    const showPlayer=S.settings.log.showPlayer!==false;

    const showZone=S.settings.log.showSpikeZone!==false;
    const showOpp=S.settings.log.showOppPlayer!==false;
    const showSZ=S.settings.log.showServeZone!==false;
    const gradeColor=r.receptionGrade==='A'?'#22C55E':r.receptionGrade==='B'?'#EAB308':'#EF4444';
    logHtml+=`<div class="log-entry team${r.team}">
      <span>
        <span style="color:${colorOf(r.team)};font-weight:700">${r.team}</span>
        ${showPlayer&&r.playerNum?` <span style="color:#EAB308;font-weight:700">#${r.playerNum}</span>`:''}
        <b style="color:${codeColor}"> ${r.code}</b>
        ${r.receptionGrade?`<span style="color:${gradeColor};font-weight:700"> ${r.receptionGrade}</span>`:''}
        ${showSlot&&r.slot?` [${r.slot}]`:''}
        ${showZone&&r.zone?`→${r.zone}`:''}
        ${showSZ&&r.serveZone&&(r.code==='SA'||r.code==='S+'||r.code==='S0'||r.code==='MS')?` <span style="color:#56627A">sz:${r.serveZone}</span>`:''}
        ${showOpp&&r.oppPlayerNum?` <span style="color:${colorOf(r.team==='A'?'B':'A')}">vs#${r.oppPlayerNum}</span>`:''}

    btn.addEventListener('click',function(){
      manualRot(this.dataset.rotManual);
    });
  });
  // ローテーションセル（data-rot-cell）
  document.querySelectorAll('[data-rot-cell]').forEach(cell=>{
    cell.addEventListener('click',function(){
      rotCellClick(this.dataset.rotTeam,Number(this.dataset.rotPos));
    });
  });
  // ローテーション選手ピッカー（data-rot-assign）
  document.querySelectorAll('[data-rot-assign]').forEach(btn=>{
    btn.addEventListener('click',function(){
      const d=this.dataset;
      rotAssign(d.rotTeam,Number(d.rotPos),d.rotNum==='null'?null:Number(d.rotNum));
    });
  });
}


// ── スパイク矢印コート図 ──────────────────────────────────────────────
function renderArrowCourt(rallies, team, playerNum){
  const arrows=[];
  rallies.forEach(r=>{
    if(r.team!==team) return;
    if(playerNum!=null&&Number(r.playerNum)!==Number(playerNum)) return;
    if(!['K','KA','MK','BO','F'].includes(r.code)) return;
    if(!r.slot||!r.zone) return;
    const kill=['K','BO','F'].includes(r.code);
    const miss=['MK'].includes(r.code);
    const isBack=r.isBackAttack===true; // バックアタックパネルから選択した時のみtrue
    arrows.push({slot:r.slot,zone:Number(r.zone),kill,miss,isBack});
  });

  if(!arrows.length) return '<div style="color:#56627A;font-size:11px;text-align:center;padding:12px">スパイクデータなし</div>';

  const W=300,H=340,PAD=14,CW=W-PAD*2;

  if(team==='A'){
    // 自チーム: 下=自コート(打点)、上=相手コート(着地ゾーン)、矢印↑
    const NET_Y=H*0.50;
    const TOP_H=NET_Y-PAD;     // 相手コート高さ
    const BOT_H=H-NET_Y-PAD*2; // 自コート高さ

    // 打点ライン2本（自コート内）
    const FRONT_Y=NET_Y+BOT_H*0.25; // フロント（ネット際）
    const BACK_Y =NET_Y+BOT_H*0.72; // バック（アタックライン）

    // スロットX: 5 4 3 2 1 0 A B C
    const frontSlots=['5','4','3','2','1','0'];
    const backSlots=['A','B','C'];
    const allSlots=['5','4','3','2','1','0','A','B','C'];
    const slotX={};
    allSlots.forEach((s,i)=>{slotX[s]=PAD+(i+0.5)*(CW/allSlots.length);});

    // 相手コートゾーン（上側）
    // サーブゾーンと同じ配置（上から）: 1 6 5(バック) / 7 8 9(中) / 2 3 4(ネット際)
    // NETラベルはゾーンの下（NETの上）に表示
    const topZoneRows=[
      [1,6,5], // バック（上）
      [7,8,9], // 中
      [2,3,4], // ネット際（下、NETに近い）
    ];
    const zPos={};
    topZoneRows.forEach((row,ri)=>{
      row.forEach((z,ci)=>{
        zPos[z]={x:PAD+(ci+0.5)*(CW/3), y:PAD+(ri+0.5)*(TOP_H/3)};
      });
    });

    // グリッド（相手コート）
    let grid='';
    for(let i=1;i<3;i++){
      grid+=`<line x1="${(PAD+i*CW/3).toFixed(1)}" y1="${PAD}" x2="${(PAD+i*CW/3).toFixed(1)}" y2="${(NET_Y-2).toFixed(1)}" stroke="#3a4560" stroke-width="0.6"/>`;
    }
    grid+=`<line x1="${PAD}" y1="${(PAD+TOP_H/3).toFixed(1)}" x2="${(PAD+CW).toFixed(1)}" y2="${(PAD+TOP_H/3).toFixed(1)}" stroke="#3a4560" stroke-width="0.6"/>`;
    grid+=`<line x1="${PAD}" y1="${(PAD+TOP_H*2/3).toFixed(1)}" x2="${(PAD+CW).toFixed(1)}" y2="${(PAD+TOP_H*2/3).toFixed(1)}" stroke="#3a4560" stroke-width="0.6"/>`;

    // 矢印
    // 同じスロット→ゾーンの組み合わせをカウントしてずらす
    const arrowCount={};
    arrows.forEach(a=>{
      const key=`${a.slot}-${a.zone}-${a.isBack?'b':'f'}`;
      arrowCount[key]=(arrowCount[key]||0)+1;
    });
    const arrowIdx={};
    let svgArrows='';
    arrows.forEach(a=>{
      const sx=slotX[a.slot];
      if(sx==null) return;
      const sy=a.isBack?BACK_Y:FRONT_Y;
      const zp=zPos[a.zone];
      if(!zp) return;
      const stroke=a.kill?'#EF4444':a.miss?'#6B7280':'#3B82F6';
      const key=`${a.slot}-${a.zone}-${a.isBack?'b':'f'}`;
      const total=arrowCount[key];
      arrowIdx[key]=(arrowIdx[key]||0);
      const idx=arrowIdx[key];
      arrowIdx[key]++;
      // 複数本の場合は起点・終点をずらす（±4pxずつ）
      const offset=total>1?(idx-(total-1)/2)*5:0;
      const startX=sx+offset;
      const endX=zp.x+offset*0.5;
      const cx=(startX+endX)/2+offset*0.3, cy=NET_Y+4;
      svgArrows+=`<path d="M${startX.toFixed(1)},${sy.toFixed(1)} Q${cx.toFixed(1)},${cy.toFixed(1)} ${endX.toFixed(1)},${zp.y.toFixed(1)}" fill="none" stroke="${stroke}" stroke-width="1.8" stroke-opacity="0.72" marker-end="url(#ah_A)"/>`;
    });

    // ゾーンラベル
    let zLabels='';
    Object.entries(zPos).forEach(([z,p])=>{
      zLabels+=`<text x="${p.x.toFixed(1)}" y="${p.y.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#94A3B8" font-weight="600" opacity="0.7">${z}</text>`;
    });

    const killCount=arrows.filter(a=>a.kill).length;
    const missCount=arrows.filter(a=>a.miss).length;
    const contCount=arrows.length-killCount-missCount;

    return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;max-width:${W}px;margin:0 auto">
      <defs><marker id="ah_A" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><polygon points="0,0 5,2.5 0,5" fill="currentColor" opacity="0.8"/></marker></defs>
      <!-- 相手コート（上） -->
      <rect x="${PAD}" y="${PAD}" width="${CW}" height="${TOP_H}" fill="rgba(59,130,246,0.07)" stroke="#3B82F6" stroke-width="1" rx="3"/>
      ${grid}${zLabels}
      <!-- NETラベル（ゾーン下・自コート上の間） -->
      <rect x="${(PAD-4).toFixed(1)}" y="${(NET_Y-5).toFixed(1)}" width="${(CW+8).toFixed(1)}" height="10" fill="#475569" rx="3"/>
      <text x="${W/2}" y="${NET_Y}" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="#fff" font-weight="700" letter-spacing="2">NET</text>
      <!-- 自コート（下） -->
      <rect x="${PAD}" y="${(NET_Y+5).toFixed(1)}" width="${CW}" height="${BOT_H}" fill="rgba(249,115,22,0.06)" stroke="#F97316" stroke-width="1" rx="3"/>
      <!-- フロント打点ライン -->
      <line x1="${PAD}" y1="${FRONT_Y.toFixed(1)}" x2="${(PAD+CW).toFixed(1)}" y2="${FRONT_Y.toFixed(1)}" stroke="#F97316" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
      <!-- バック打点ライン -->
      <line x1="${PAD}" y1="${BACK_Y.toFixed(1)}" x2="${(PAD+CW).toFixed(1)}" y2="${BACK_Y.toFixed(1)}" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
      <!-- 矢印 -->
      ${svgArrows}
      <!-- 凡例 -->
      <rect x="${PAD}" y="${(H-18).toFixed(1)}" width="${CW}" height="14" fill="rgba(0,0,0,0.25)" rx="3"/>
      <line x1="${PAD+5}" y1="${H-11}" x2="${PAD+16}" y2="${H-11}" stroke="#EF4444" stroke-width="2"/>
      <text x="${PAD+19}" y="${H-11}" dominant-baseline="middle" font-size="8" fill="#EF4444">決定${killCount}</text>
      <line x1="${PAD+58}" y1="${H-11}" x2="${PAD+69}" y2="${H-11}" stroke="#3B82F6" stroke-width="2"/>
      <text x="${PAD+72}" y="${H-11}" dominant-baseline="middle" font-size="8" fill="#3B82F6">継続${contCount}</text>
      <line x1="${PAD+112}" y1="${H-11}" x2="${PAD+123}" y2="${H-11}" stroke="#6B7280" stroke-width="2"/>
      <text x="${PAD+126}" y="${H-11}" dominant-baseline="middle" font-size="8" fill="#94A3B8">ミス${missCount}</text>
      <text x="${(W-PAD).toFixed(1)}" y="${H-11}" text-anchor="end" dominant-baseline="middle" font-size="8" fill="#56627A">計${arrows.length}本</text>
      <!-- NETラベル（下部にも表示） -->
      <text x="${W/2}" y="${(NET_Y+16).toFixed(1)}" text-anchor="middle" font-size="7" fill="#94A3B8" opacity="0.6">▼ NET</text>
    </svg>`;

  } else {
    // 相手チーム: 上=相手コート(打点)、下=自コート(着地ゾーン)、矢印↓
    const NET_Y=H*0.50;
    const TOP_H=NET_Y-PAD;
    const BOT_H=H-NET_Y-PAD*2;

    // 打点ライン2本（相手コート内）
    const FRONT_Y=NET_Y-TOP_H*0.25; // フロント（ネット際）
    const BACK_Y =NET_Y-TOP_H*0.72; // バック（アタックライン）

    // 相手スロットX: C B A 0 1 2 3 4 5（相手視点で左右反転）
    const allSlotsB=['C','B','A','0','1','2','3','4','5'];
    const slotXB={};
    allSlotsB.forEach((s,i)=>{slotXB[s]=PAD+(i+0.5)*(CW/allSlotsB.length);});

    // 自コートゾーン（下側）
    // ネット側(上)から下へ: 4 3 2 → 9 8 7 → 5 6 1
    const botZoneRows=[
      [4,3,2], // ネット際（上）
      [9,8,7], // 中
      [5,6,1], // バック（下）
    ];
    const zPos={};
    botZoneRows.forEach((row,ri)=>{
      row.forEach((z,ci)=>{
        zPos[z]={x:PAD+(ci+0.5)*(CW/3), y:NET_Y+PAD+(ri+0.5)*(BOT_H/3)};
      });
    });

    let grid='';
    for(let i=1;i<3;i++){
      grid+=`<line x1="${(PAD+i*CW/3).toFixed(1)}" y1="${(NET_Y+PAD).toFixed(1)}" x2="${(PAD+i*CW/3).toFixed(1)}" y2="${(H-PAD).toFixed(1)}" stroke="#3a4560" stroke-width="0.6"/>`;
    }
    grid+=`<line x1="${PAD}" y1="${(NET_Y+PAD+BOT_H/3).toFixed(1)}" x2="${(PAD+CW).toFixed(1)}" y2="${(NET_Y+PAD+BOT_H/3).toFixed(1)}" stroke="#3a4560" stroke-width="0.6"/>`;
    grid+=`<line x1="${PAD}" y1="${(NET_Y+PAD+BOT_H*2/3).toFixed(1)}" x2="${(PAD+CW).toFixed(1)}" y2="${(NET_Y+PAD+BOT_H*2/3).toFixed(1)}" stroke="#3a4560" stroke-width="0.6"/>`;

    const arrowCountB={};
    arrows.forEach(a=>{
      const key=`${a.slot}-${a.zone}-${a.isBack?'b':'f'}`;
      arrowCountB[key]=(arrowCountB[key]||0)+1;
    });
    const arrowIdxB={};
    let svgArrows='';
    arrows.forEach(a=>{
      const sx=slotXB[a.slot];
      if(sx==null) return;
      const sy=a.isBack?BACK_Y:FRONT_Y;
      const zp=zPos[a.zone];
      if(!zp) return;
      const stroke=a.kill?'#EF4444':a.miss?'#6B7280':'#3B82F6';
      const key=`${a.slot}-${a.zone}-${a.isBack?'b':'f'}`;
      const total=arrowCountB[key];
      arrowIdxB[key]=(arrowIdxB[key]||0);
      const idx=arrowIdxB[key];
      arrowIdxB[key]++;
      const offset=total>1?(idx-(total-1)/2)*5:0;
      const startX=sx+offset;
      const endX=zp.x+offset*0.5;
      const cx=(startX+endX)/2+offset*0.3, cy=NET_Y-4;
      svgArrows+=`<path d="M${startX.toFixed(1)},${sy.toFixed(1)} Q${cx.toFixed(1)},${cy.toFixed(1)} ${endX.toFixed(1)},${zp.y.toFixed(1)}" fill="none" stroke="${stroke}" stroke-width="1.8" stroke-opacity="0.72" marker-end="url(#ah_B)"/>`;
    });

    let zLabels='';
    Object.entries(zPos).forEach(([z,p])=>{
      zLabels+=`<text x="${p.x.toFixed(1)}" y="${p.y.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#94A3B8" font-weight="600" opacity="0.7">${z}</text>`;
    });

    const killCount=arrows.filter(a=>a.kill).length;
    const missCount=arrows.filter(a=>a.miss).length;
    const contCount=arrows.length-killCount-missCount;

    return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;max-width:${W}px;margin:0 auto">
      <defs><marker id="ah_B" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><polygon points="0,0 5,2.5 0,5" fill="currentColor" opacity="0.8"/></marker></defs>
      <!-- 相手コート（上） -->
      <rect x="${PAD}" y="${PAD}" width="${CW}" height="${TOP_H}" fill="rgba(59,130,246,0.07)" stroke="#3B82F6" stroke-width="1" rx="3"/>
      <!-- バック打点ライン -->
      <line x1="${PAD}" y1="${BACK_Y.toFixed(1)}" x2="${(PAD+CW).toFixed(1)}" y2="${BACK_Y.toFixed(1)}" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
      <!-- フロント打点ライン -->
      <line x1="${PAD}" y1="${FRONT_Y.toFixed(1)}" x2="${(PAD+CW).toFixed(1)}" y2="${FRONT_Y.toFixed(1)}" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
      <!-- 矢印 -->
      ${svgArrows}
      <!-- ネット -->
      <rect x="${(PAD-4).toFixed(1)}" y="${(NET_Y-5).toFixed(1)}" width="${(CW+8).toFixed(1)}" height="10" fill="#475569" rx="3"/>
      <text x="${W/2}" y="${NET_Y}" text-anchor="middle" dominant-baseline="middle" font-size="8" fill="#fff" font-weight="700" letter-spacing="2">NET</text>
      <!-- 自コート（下） -->
      <rect x="${PAD}" y="${(NET_Y+5).toFixed(1)}" width="${CW}" height="${BOT_H}" fill="rgba(249,115,22,0.06)" stroke="#F97316" stroke-width="1" rx="3"/>
      ${grid}${zLabels}
      <!-- 凡例 -->
      <rect x="${PAD}" y="${(H-18).toFixed(1)}" width="${CW}" height="14" fill="rgba(0,0,0,0.25)" rx="3"/>
      <line x1="${PAD+5}" y1="${H-11}" x2="${PAD+16}" y2="${H-11}" stroke="#EF4444" stroke-width="2"/>
      <text x="${PAD+19}" y="${H-11}" dominant-baseline="middle" font-size="8" fill="#EF4444">決定${killCount}</text>
      <line x1="${PAD+58}" y1="${H-11}" x2="${PAD+69}" y2="${H-11}" stroke="#3B82F6" stroke-width="2"/>
      <text x="${PAD+72}" y="${H-11}" dominant-baseline="middle" font-size="8" fill="#3B82F6">継続${contCount}</text>
      <line x1="${PAD+112}" y1="${H-11}" x2="${PAD+123}" y2="${H-11}" stroke="#6B7280" stroke-width="2"/>
      <text x="${PAD+126}" y="${H-11}" dominant-baseline="middle" font-size="8" fill="#94A3B8">ミス${missCount}</text>
      <text x="${(W-PAD).toFixed(1)}" y="${H-11}" text-anchor="end" dominant-baseline="middle" font-size="8" fill="#56627A">計${arrows.length}本</text>
    </svg>`;
  }
}


function renderAnalysis(){
  const sa=calcStats('A',null),sb=calcStats('B',null); // 全セット集計
  const isHistorical=S.currentMatchId&&S.matches.find(m=>m.id===S.currentMatchId&&m.rally===S.rally);
  const matchInfo=S.currentMatchId?S.matches.find(m=>m.id===S.currentMatchId):null;

  let html=``;
  // 試合情報ヘッダー
  if(matchInfo){
    html+=`<div style="background:#1A2540;border-radius:10px;padding:8px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px">
      <div style="flex:1">
        <div style="font-size:9px;color:#56627A">表示中の試合</div>
        <div style="font-size:12px;font-weight:700">${matchInfo.date} vs ${matchInfo.oppTeamName}</div>
      </div>
      <button onclick="switchTab('teams')" style="background:transparent;border:1px solid #2A3A5C;border-radius:7px;color:#94A3B8;padding:4px 8px;font-size:10px;cursor:pointer">履歴一覧</button>
    </div>`;
  }
  html+=`<button onclick="exportPDF()" style="width:100%;padding:10px;background:#F97316;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:8px">
    📄 試合レポートをダウンロード</button>
  <div style="font-size:9px;color:#56627A;text-align:center;margin-bottom:10px">
    ※ iPhoneはファイルアプリのダウンロード欄に保存されます。Safariで開いて印刷可能。
  </div>`;

  // Serve zone analysis
  [['A',S.teamA,'#F97316',sa],['B',S.teamB,'#3B82F6',sb]].forEach(([t,n,c,st])=>{
    const szd=st.szr;
    const maxTotal=Math.max(...Object.values(szd).map(v=>v.total),1);
    const hasData=Object.values(szd).some(v=>v.total>0);
    if(!hasData) return;
    const zoneLayout=t==='B'?ZONE_SERVE_B:ZONE_SERVE_A;
    html+=`<div class="stat-card"><h3 style="color:${c}">${n} サーブゾーン（着地）分析</h3>
    <div style="color:#94A3B8;font-size:9px;margin-bottom:6px">サーブがどのゾーンに入ったか・効果があるか（スパイクゾーンとは別集計）</div>
    <div class="sz-grid">`;
    zoneLayout.forEach(row=>{
      html+='<div class="sz-row">';
      row.forEach(z=>{
        const d=szd[z]||{total:0,ace:0,effect:0};
        const intensity=d.total/maxTotal;
        const effectPct=d.total>0?Math.round((d.ace+d.effect)/d.total*100):0;
        html+=`<div class="sz-cell" style="background:${d.total===0?'#16203a':'rgba('+hexToRgb(c)+','+(0.12+intensity*0.6).toFixed(2)+')'}">
          <div class="sz-z">Z${z}</div>
          <div class="sz-n" style="color:${c}">${d.total||''}</div>
          ${d.ace>0?`<div class="sz-ace">SA${d.ace}</div>`:''}
          ${effectPct>0?`<div class="sz-pct">${effectPct}%</div>`:''}
        </div>`;
      });
      html+='</div>';
    });
    html+='<div style="text-align:center;color:#94A3B8;font-size:8px;margin-top:3px">▼ ネット ▼</div>';
    html+='</div>';
    // eff ranking
    const eff=Object.entries(szd).filter(([,d])=>d.total>=2).map(([z,d])=>({z:Number(z),rate:(d.ace+d.effect)/d.total,total:d.total})).sort((a,b)=>b.rate-a.rate).slice(0,3);
    if(eff.length){
      html+='<div style="color:#94A3B8;font-size:9px;margin-bottom:4px">効果率が高いゾーン</div>';
      eff.forEach(item=>{
        html+=`<div class="eff-bar">
          <div class="eff-bar-z" style="color:${c}">Zone ${item.z}</div>
          <div class="eff-bar-track"><div class="eff-bar-fill" style="width:${Math.round(item.rate*100)}%;background:${c}"></div></div>
          <div class="eff-bar-pct" style="color:${c}">${Math.round(item.rate*100)}%</div>
          <div class="eff-bar-cnt">${item.total}本</div>
        </div>`;
      });
    }
    html+='</div>';
  });

  // Team stats
  [['A',S.teamA,'#F97316',sa],['B',S.teamB,'#3B82F6',sb]].forEach(([t,n,c,st])=>{
    const maxZ=Math.max(...Object.values(st.zoneAll),1);
    const maxZK=Math.max(...Object.values(st.zoneKill),1);
    const maxSlot=Math.max(...SLOTS_A.map(s=>st.slotAll[s]||0),1);
    html+=`<div class="stat-card"><h3 style="color:${c}">${n}</h3>
    <div class="kpi-row">
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-val" style="color:${c}">${st.killPct}</div><div class="kpi-lbl">決定率</div></div>
      <div class="kpi"><div class="kpi-val" style="color:#22C55E">${st.serveEffRate!=null?st.serveEffRate:"—"}</div><div class="kpi-lbl">サーブ効果率</div></div>
      <div class="kpi"><div class="kpi-val" style="color:#22C55E">${st.serves}</div><div class="kpi-lbl">SA本数</div></div>
      <div class="kpi"><div class="kpi-val">${st.pts}</div><div class="kpi-lbl">得点</div></div>
    </div>
      <div style="color:#94A3B8;font-size:9px;margin-bottom:4px">スロット別（緑=決定）</div>
      <div class="slot-chart">`;
    SLOTS_A.forEach(s=>{
      const v=st.slotAll[s]||0,k=st.slotKill[s]||0,h=(v/maxSlot)*100;
      html+=`<div class="slot-bar-col"><div class="slot-bar-val">${v||''}</div>
        <div class="slot-bar-inner" style="height:${h}%;background:${c};border-radius:2px 2px 0 0">
          ${k>0?`<div style="position:absolute;bottom:0;left:0;right:0;height:${(k/v)*100}%;background:#22C55E;border-radius:2px 2px 0 0"></div>`:''}
        </div></div>`;
    });
    html+=`</div><div class="slot-labels">`;
    SLOTS_A.forEach(s=>{html+=`<span>${s}</span>`;});
    html+=`</div></div>
    <div class="heat-row">
      <div class="heat-col">${miniHeat(st.zoneAll,maxZ,c,c)}<p>スパイク着地（全）</p></div>
      <div class="heat-col">${miniHeat(st.zoneKill,maxZK,'#3B82F6','#22C55E')}<p>スパイク着地（決定）</p></div>
    </div>
    <div style="color:#94A3B8;font-size:10px;font-weight:600;margin-bottom:6px">選手別スタッツ・決定率・攻撃ルート</div>
    <div style="overflow-x:auto;margin-bottom:8px">
    <table class="ptable"><thead><tr><th>#</th><th>K</th><th>BO</th><th>KA</th><th>MK</th><th>決定率</th><th>F</th><th>B</th><th>SA</th><th>S+</th><th>MS</th><th>効果率</th><th>M</th><th>R+A</th><th>R+B</th><th>R+C</th><th>MSR</th><th>得点</th></tr></thead><tbody>`;
    st.players.forEach((p,i)=>{
      const spTotal=(p.K||0)+(p.KA||0)+(p.MK||0)+(p.BO||0)+(p.F||0)+(p.MF||0);
      const killPct=pct((p.K||0)+(p.BO||0)+(p.F||0),spTotal);
      html+=`<tr style="${i%2===0?'background:#1A2540':''}">
        <td style="color:${c};font-weight:700">${p.num}</td>
        <td>${p.K||0}</td><td>${p.BO||0}</td><td>${p.KA||0}</td><td>${p.MK||0}</td>
        <td style="color:${c};font-weight:700">${killPct}</td>
        <td>${p.F||0}</td><td>${p.B||0}</td>
        <td style="color:#22C55E">${p.SA||0}</td>
        <td>${p['S+']||0}</td>
        <td style="color:#EF4444">${p.MS||0}</td>
        <td style="color:#22C55E;font-weight:700">${p.serveEffRate!=null?p.serveEffRate:'—'}</td>
        <td style="color:#F43F5E">${p.M||0}</td>
        <td style="color:#22C55E">${p.recA||0}</td>
        <td style="color:#EAB308">${p.recB||0}</td>
        <td style="color:#EF4444">${p.recC||0}</td>
        <td style="color:#EF4444">${p.MSR||0}</td>
        <td style="color:#22C55E;font-weight:700">${p.pts||0}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;

    // Reception grade bar
    if(st.recTotal>0){
      const rA=st.recA,rB=st.recB,rC=st.recC,rM=st.recMiss,rT=st.recTotal;
      html+=`<div style="background:#1A2540;border-radius:8px;padding:8px;margin-bottom:8px">
        <div style="color:#94A3B8;font-size:9px;margin-bottom:4px">レセプション評価（全${rT}本）</div>
        <div style="display:flex;height:16px;border-radius:6px;overflow:hidden;margin-bottom:4px">
          <div style="width:${(rA/rT*100).toFixed(1)}%;background:#22C55E" title="A"></div>
          <div style="width:${(rB/rT*100).toFixed(1)}%;background:#EAB308" title="B"></div>
          <div style="width:${(rC/rT*100).toFixed(1)}%;background:#F97316" title="C"></div>
          <div style="width:${(rM/rT*100).toFixed(1)}%;background:#EF4444" title="Miss"></div>
        </div>
        <div style="display:flex;gap:8px;font-size:10px">
          <span style="color:#22C55E">A: ${rA} (${pct(rA,rT)})</span>
          <span style="color:#EAB308">B: ${rB} (${pct(rB,rT)})</span>
          <span style="color:#F97316">C: ${rC} (${pct(rC,rT)})</span>
          <span style="color:#EF4444">Miss: ${rM} (${pct(rM,rT)})</span>
        </div>
      </div>`;
    }

    // Player reception grades
    const recPlayers=st.players.filter(p=>(p['R+']||0)+(p.recA||0)+(p.recB||0)+(p.recC||0)+(p.MSR||0)>0);
    if(recPlayers.length){
      html+=`<div style="color:#94A3B8;font-size:9px;margin-bottom:4px">選手別レセプション評価</div>`;
      recPlayers.forEach(p=>{
        const rT=(p.recA||0)+(p.recB||0)+(p.recC||0)+(p.MSR||0);
        if(!rT) return;
        html+=`<div style="background:#1A2540;border-radius:7px;padding:5px 8px;margin-bottom:3px;display:flex;align-items:center;gap:6px">
          <span style="color:${c};font-weight:700;min-width:28px">#${p.num}</span>
          <div style="flex:1;height:10px;border-radius:4px;overflow:hidden;display:flex">
            <div style="width:${pct(p.recA||0,rT)};background:#22C55E"></div>
            <div style="width:${pct(p.recB||0,rT)};background:#EAB308"></div>
            <div style="width:${pct(p.recC||0,rT)};background:#F97316"></div>
            <div style="width:${pct(p.MSR||0,rT)};background:#EF4444"></div>
          </div>
          <span style="font-size:9px;color:#94A3B8">${rT}本</span>
        </div>`;
      });
    }

    // 矢印コート図（選手プルダウン付き）
    const arrowPlayers=st.players.filter(p=>Object.keys(p.combo||{}).length>0);
    const arrowSelKey='_arrowSel_'+t;
    const selNum=S[arrowSelKey]||null;
    const teamArrows=renderArrowCourt(S.rally,t,selNum?Number(selNum):null);
    let playerOptions=`<option value="">全選手</option>`;
    arrowPlayers.forEach(p=>{
      playerOptions+=`<option value="${p.num}" ${String(selNum)===String(p.num)?'selected':''}>#${p.num} ${p.name}</option>`;
    });
    html+=`<div class="stat-card"><h3 style="color:${c}">攻撃軌跡</h3>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="font-size:9px;color:#56627A">選手フィルター：</div>
        <select id="arrow-sel-${t}" onchange="S['_arrowSel_${t}']=this.value;renderRight()"
          style="flex:1;background:#131C30;border:1px solid #2A3A5C;border-radius:7px;color:#F1F5F9;padding:5px 8px;font-size:12px">
          ${playerOptions}
        </select>
      </div>
      <div style="font-size:9px;color:#56627A;margin-bottom:6px">赤=決定 / 青=継続 / グレー=ミス</div>
      ${teamArrows}
    </div>`;

    // Slot-Zone percentage per player
    const attackPlayers=st.players.filter(p=>Object.keys(p.combo||{}).length>0);
    if(attackPlayers.length){
      html+=`<div style="color:#94A3B8;font-size:10px;font-weight:600;margin:8px 0 6px">選手別攻撃ルート</div>`;
      attackPlayers.forEach(p=>{
        const combos=Object.values(p.combo).sort((a,b)=>b.t-a.t);
        if(!combos.length) return;
        const totalAtk=combos.reduce((s,v)=>s+v.t,0);
        const spTotal=(p.K||0)+(p.KA||0)+(p.MK||0)+(p.BO||0);
        const killPctVal=pct((p.K||0)+(p.BO||0),spTotal);

        // Build zone usage map: zone -> {t, k}
        const zoneMap={};
        combos.forEach(cm=>{
          if(!zoneMap[cm.zone])zoneMap[cm.zone]={t:0,k:0,slots:{}};
          zoneMap[cm.zone].t+=cm.t;
          zoneMap[cm.zone].k+=cm.k;
          if(!zoneMap[cm.zone].slots[cm.slot])zoneMap[cm.zone].slots[cm.slot]=0;
          zoneMap[cm.zone].slots[cm.slot]+=cm.t;
        });
        const maxZone=Math.max(...Object.values(zoneMap).map(v=>v.t),1);

        // Slot usage bar
        const slotTotals={};
        combos.forEach(cm=>{
          slotTotals[cm.slot]=(slotTotals[cm.slot]||0)+cm.t;
        });
        const maxSlot=Math.max(...Object.values(slotTotals),1);
        const slotList=(S.actorTeam==='B'?SLOTS_B:SLOTS_A);

        html+=`<div style="background:#131C30;border-radius:10px;padding:10px;margin-bottom:8px;border-left:3px solid ${c}">
          <!-- player header -->
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div style="color:${c};font-weight:800;font-size:15px">#${p.num}</div>
            <div style="flex:1">
              <div style="font-size:11px;font-weight:700">${p.name}</div>
              <div style="font-size:9px;color:#56627A">${totalAtk}本 / 決定率 ${killPctVal}</div>
            </div>
          </div>

          <div style="display:flex;gap:8px;align-items:flex-start">
            <!-- Left: slot bar -->
            <div style="flex:0 0 80px">
              <div style="font-size:8px;color:#56627A;margin-bottom:4px;text-align:center">スロット</div>
              <div style="display:flex;flex-direction:column;gap:2px">`;

        slotList.forEach(s=>{
          const v=slotTotals[s]||0;
          if(!v) return;
          const w=Math.round((v/maxSlot)*100);
          const killV=combos.filter(cm=>cm.slot===s).reduce((sum,cm)=>sum+cm.k,0);
          html+=`<div style="display:flex;align-items:center;gap:3px">
            <div style="font-size:9px;font-weight:700;color:${c};width:14px;text-align:right">${s}</div>
            <div style="flex:1;height:12px;background:#1A2540;border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${w}%;background:${c};border-radius:3px;position:relative">
                ${killV>0?`<div style="position:absolute;left:0;top:0;height:100%;width:${Math.round(killV/v*100)}%;background:#22C55E;border-radius:3px"></div>`:''}
              </div>
            </div>
            <div style="font-size:8px;color:#56627A;width:18px">${v}</div>
          </div>`;
        });

        html+=`</div></div>

            <!-- Right: zone heatmap (attack layout) -->
            <div style="flex:1">
              <div style="font-size:8px;color:#56627A;margin-bottom:4px;text-align:center">ゾーン（▲ネット）</div>
              <div style="display:flex;flex-direction:column;gap:2px">`;

        // Use ATK or DEF layout based on actor team
        const zLayout=t==='B'?ZONE_DEF:ZONE_ATK;
        zLayout.forEach(row=>{
          html+=`<div style="display:flex;gap:2px">`;
          row.forEach(z=>{
            const zd=zoneMap[z]||{t:0,k:0};
            const intensity=zd.t/maxZone;
            const bg=zd.t===0?'#1A2540':zd.k>0
              ?`rgba(34,197,94,${0.15+intensity*0.7})`
              :`rgba(${hexToRgb(c)},${0.15+intensity*0.6})`;
            const border=zd.t===0?'#2A3A5C':zd.k>0?'#22C55E':c;
            // Most used slot for this zone
            const topSlot=zd.t>0?Object.entries(zd.slots||{}).sort((a,b)=>b[1]-a[1])[0]:null;
            html+=`<div style="flex:1;aspect-ratio:1.2;border-radius:5px;background:${bg};border:1.5px solid ${border};display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative">
              <div style="font-size:11px;font-weight:800;color:${zd.t>0?'#fff':'#56627A'}">${z}</div>
              ${zd.t>0?`<div style="font-size:8px;color:rgba(255,255,255,0.8)">${zd.t}本</div>`:''}
              ${zd.k>0?`<div style="position:absolute;top:1px;right:2px;font-size:7px;color:#22C55E;font-weight:700">${pct(zd.k,zd.t)}</div>`:''}
              ${topSlot?`<div style="position:absolute;bottom:1px;left:2px;font-size:7px;color:rgba(255,255,255,0.6)">S${topSlot[0]}</div>`:''}
            </div>`;
          });
          html+=`</div>`;
        });

        html+=`</div></div>
          </div>


          <!-- Top routes summary -->
          <div style="margin-top:8px;padding-top:6px;border-top:1px solid #2A3A5C">
            <div style="font-size:8px;color:#56627A;margin-bottom:4px">よく使うルート（上位3）</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px">`;
        combos.slice(0,3).forEach((cm,i)=>{
          const rank=['🥇','🥈','🥉'][i]||'';
          html+=`<div style="background:#1A2540;border-radius:6px;padding:3px 8px;display:flex;align-items:center;gap:4px;font-size:10px">
            <span>${rank}</span>
            <span style="color:${c};font-weight:700">S${cm.slot}</span>
            <span style="color:#56627A;font-size:9px">→</span>
            <span style="color:#fff;font-weight:700">Z${cm.zone}</span>
            <span style="color:#56627A;font-size:9px">${cm.t}本 ${pct(cm.t,totalAtk)}</span>
            ${cm.k>0?`<span style="color:#22C55E;font-size:9px">決${pct(cm.k,cm.t)}</span>`:''}
          </div>`;
        });
        html+=`</div></div>
        </div>`;
      });
    }
    html+='</div>';
  });
  return html;
}

function renderStrategy(){
  // ── 攻略メモ ──
  let html=`<div class="stat-card">
    <h3 style="color:#3B82F6">📝 攻略メモ</h3>
    <textarea id="strategy-note" style="width:100%;min-height:200px;background:#131C30;border:1px solid #2A3A5C;border-radius:8px;color:#F1F5F9;padding:10px;font-size:12px;resize:vertical"
      placeholder="相手の傾向、サーブターゲット、攻略ポイントなど...">${S.strategyNote||''}</textarea>
  </div>`;

  setTimeout(()=>{
    document.getElementById('strategy-note')?.addEventListener('input',function(){
      S.strategyNote=this.value;saveToLS();
    });
  },50);

  return html;
}

// ── Main Render ───────────────────────────────────────────────────────
function render(){
  // 閲覧専用モードの場合は入力関連を非表示
  if(S._viewOnly){
    // コートは表示するが入力不可
    document.getElementById('court-wrap').style.pointerEvents='none';
    document.getElementById('quick-bar').style.display='none';
    document.getElementById('action-panel').style.display='none';
    document.getElementById('swipe-panel').style.display='none';
    document.getElementById('opp-hint').style.display='none';
    document.getElementById('sa-opp').style.display='none';
    document.getElementById('serve-banner').style.display='none';
    document.getElementById('hint').style.display='none';
    // 「記録に戻る」バナーを表示
    let voBanner=document.getElementById('vo-banner');
    if(!voBanner){
      voBanner=document.createElement('div');
      voBanner.id='vo-banner';
      voBanner.style.cssText='background:#1A2540;border:1px solid #EAB308;border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:6px';
      voBanner.innerHTML='<span style="font-size:11px;color:#EAB308;flex:1">📋 閲覧モード（過去の試合）</span><button onclick="exitViewOnly()" style="padding:6px 12px;background:#F97316;border:none;border-radius:7px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">記録に戻る</button>';
      document.getElementById('left').insertBefore(voBanner, document.getElementById('court-wrap'));
    }
    // スコアボード更新のみ実行
    const sa=scoreOf('A'),sb=scoreOf('B');
    const srvColor=colorOf(S.server);
    document.documentElement.style.setProperty('--srv-color',srvColor);
    renderRight();
    renderCourt();
    return;
  }
  // 閲覧バナーを削除
  const voBanner=document.getElementById('vo-banner');
  if(voBanner) voBanner.remove();
  document.getElementById('court-wrap').style.pointerEvents='';
  document.getElementById('quick-bar').style.display='';
  // チーム名を取得（nameB入力欄から）
  S.teamA=document.getElementById('nameA').value||S.myTeamName||'Team A';
  // teamBはnameB入力欄から。ただし現在の試合の相手チームIDから名前を引く
  const _nameB=document.getElementById('nameB');
  if(_nameB) S.teamB=_nameB.value||S.teamB;

  const sa=scoreOf('A'),sb=scoreOf('B');
  const ended=checkSetEnd(sa,sb);
  const srvColor=colorOf(S.server);

  // Topbar
  document.documentElement.style.setProperty('--srv-color',srvColor);
  document.getElementById('topbar').style.borderBottomColor=srvColor;
  document.getElementById('srv-badge').style.borderColor=srvColor;
  document.getElementById('srv-badge').style.background=`rgba(${hexToRgb(srvColor)},0.13)`;
  document.getElementById('srv-name').textContent=getTeamName(S.server)+' サーブ';
  const szBadge=document.getElementById('srv-zone-badge');
  if(S.serveZone&&S.serveZoneLocked){szBadge.style.display='';szBadge.textContent='Zone '+S.serveZone;szBadge.style.color=srvColor;}
  else szBadge.style.display='none';

  // Scoreboard
  document.getElementById('scoreboard').style.borderColor=srvColor;
  document.getElementById('scoreA').textContent=sa;
  document.getElementById('scoreB').textContent=sb;
  document.getElementById('setLabel').textContent='Set '+S.curSet;
  document.getElementById('srvA').style.display=S.server==='A'?'':'none';
  document.getElementById('srvB').style.display=S.server==='B'?'':'none';
  document.getElementById('deuce-lbl').style.display=(sa>=24&&sb>=24&&!ended)?'':'none';
  document.getElementById('setend-lbl').style.display=ended?'':'none';

  // Set buttons
  let setBtns='';
  for(let i=1;i<=S.curSet;i++){
    setBtns+=`<button class="setbtn" style="background:${S.curSet===i?'#F97316':'#1E3A6E'}" onclick="S.curSet=${i};render()">${i}</button>`;
  }
  setBtns+=`<button class="setbtn" style="background:#2A3A5C;color:#94A3B8" onclick="S.curSet++;S.showSetStart=true;startNextRally();render()">+</button>`;
  document.getElementById('set-btns').innerHTML=setBtns;

  // Set end
  const setEndEl=document.getElementById('set-end');
  if(ended&&!S.showSetStart){
    setEndEl.style.display='';
    const winner=sa>sb?S.teamA:S.teamB;
    document.getElementById('set-end-title').textContent=`🏆 Set ${S.curSet} 終了 — ${winner} 勝利 ${sa}-${sb}`;
  } else setEndEl.style.display='none';

  // Set start modal
  if(S.showSetStart) renderSetStart();

  // Serve banner
  renderServeBanner();

  // SA opp picker
  renderSAOppPicker();

  // Hint
  const hintEl=document.getElementById('hint');
  if(S.serveZoneLocked&&!ended&&!S.pendingOppForServe){
    hintEl.style.display='flex';
    const ac=S.pendAction;
    const aColor=S.actorTeam?colorOf(S.actorTeam):'#94A3B8';
    hintEl.style.borderColor=ac?aColor:'#2A3A5C';

    // Step indicator: Actor → Action → Slot → Zone → OppPlayer
    function stepDot(label,done,active){
      const bg=done?'#22C55E':active?aColor:'#2A3A5C';
      const c=done||active?'#fff':'#56627A';
      return `<div class="hint-step-dot" style="background:${bg};color:${c}">${done?'✓':label}</div>`;
    }
    const hasActor=!!S.actorNum;
    const hasAction=!!ac;
    const hasSlot=!ac||!ac.needsSlot||!!S.pendSlot;
    const hasZone=!ac||!ac.needsZone||!!S.pendZone;
    const needsOppStep=ac&&ac.needsOpp;

    let stepsHtml=`<div class="hint-steps">
      ${stepDot('選',hasActor&&hasAction,hasActor&&!hasAction)}
      <span class="hint-step-arrow">→</span>
      ${stepDot('A',hasAction&&hasSlot&&hasZone,hasAction&&!hasSlot)}
      ${ac&&ac.needsSlot?'<span class="hint-step-arrow">→</span>'+stepDot('S',!!S.pendSlot,hasAction&&!S.pendSlot&&ac.needsSlot):''}
      ${ac&&ac.needsZone?'<span class="hint-step-arrow">→</span>'+stepDot('Z',!!S.pendZone,hasAction&&(!!S.pendSlot||!ac.needsSlot)&&!S.pendZone):''}
      ${needsOppStep?'<span class="hint-step-arrow">→</span>'+stepDot('相',!!S.oppNum,!!S.pendZone||(!ac.needsZone&&hasAction&&(!!S.pendSlot||!ac.needsSlot))): ''}
    </div>`;

    const msgColor=ac?aColor:'#94A3B8';
    hintEl.innerHTML=`${stepsHtml}
    <div class="hint-main">
      <div id="hint-text" style="color:${msgColor}">${getHintText()}</div>
      ${(S.pendAction||S.actorNum)?'<button class="cancel-btn" onclick="cancelFlow();render()">× リセット</button>':''}</div>`;
  } else hintEl.style.display='none';

  // Court
  if(S.serveZoneLocked&&!ended) renderCourt();
  else{
    document.getElementById('court-opp').innerHTML='';
    document.getElementById('court-own').innerHTML='';
  }
  document.getElementById('court-wrap').style.display=S.serveZoneLocked&&!ended?'':'none';

  // Action panel (inline, below court)
  renderActionPanel();

  // Bench
  renderBench();

  // Reception grade picker
  renderReceptionGrade();

  // Unified swipe panel (slot + zone in one gesture)
  renderSwipePanel();

  // Opp hint
  const _killOppSide=S.actorTeam==='A'?'own':'opp';
  const _killOppOn=S.settings[_killOppSide].killOppSelect!==false;
  const needsOpp=S.pendAction&&S.pendAction.needsOpp&&_killOppOn&&!S.oppNum&&(!S.pendAction.needsZone||S.pendZone);
  const needsSAOpp=S.pendAction&&S.pendAction.code==='SA'&&S.pendZone!=null;
  const oppHintEl=document.getElementById('opp-hint');
  oppHintEl.style.display=(needsOpp||needsSAOpp)&&!S.pendingOppForServe?'':'none';
  if(needsOpp||needsSAOpp){
    const code=S.pendAction?S.pendAction.code:'';
    let oppMsg='相手選手をタップ';
    if(code==='K') oppMsg=`K Zone${S.pendZone||''} — 失点した相手選手をタップ`;
    else if(code==='KA') oppMsg=`KA Zone${S.pendZone||''} — ディグした相手選手をタップ`;
    else if(code==='BO') oppMsg='BO — ブロックに当てた相手選手をタップ';
    else if(code==='F') oppMsg=`F Zone${S.pendZone||''} — 失点した相手選手をタップ`;
    else if(code==='SA') oppMsg=`SA Zone${S.pendZone} — 失点した相手選手をタップ`;
    else if(code==='B') oppMsg='B — ブロックした相手スパイカーをタップ';
    oppHintEl.querySelector('p').textContent=oppMsg;
  }

  // Right
  renderRight();
}

// init
window.addEventListener('DOMContentLoaded',()=>{
  loadFromLS();
  const nA=document.getElementById('nameA');
  const nB=document.getElementById('nameB');
  if(nA) nA.value=S.teamA;
  if(nB) nB.value=S.teamB;
  S.showSetStart=false;
  render();
  // Firebase初期化してからメニューを開く
  // redirect処理中の場合はinitFirebaseがreturnするのでメニューは開かれない
  initFirebase().then(()=>{
    // initFirebaseがreturnした＝redirect処理なし → メニューを開く
    setTimeout(()=>openMenu(), 150);
  }).catch(()=>{
    setTimeout(()=>openMenu(), 150);
  });
});

    // iOSでPWA強制終了時に確実に保存
    try{
      saveCurrentMatch();
      saveToLS();
    }catch(e){}

});

<script>
// ── Service Worker（オフライン対応） ──────────────────────────────────
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='revolley-v3';
const ASSETS=['/'];

self.addEventListener('install',e=>{
  e.waitUntil(
    caches.open(CACHE).then(c=>c.addAll(ASSETS)).then(()=>self.skipWaiting())
  );
});

self.addEventListener('activate',e=>{
  e.waitUntil(
    caches.keys().then(keys=>Promise.all(
      keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))
    )).then(()=>self.clients.claim())
  );
});

self.addEventListener('fetch',e=>{
  // ナビゲーションリクエスト（ページ自体）はキャッシュ優先
  if(e.request.mode==='navigate'){
    e.respondWith(
      caches.match(e.request).then(cached=>{
        if(cached) return cached;
        return fetch(e.request).then(res=>{
          const clone=res.clone();
          caches.open(CACHE).then(c=>c.put(e.request,clone));
          return res;
        }).catch(()=>caches.match('/'));
      })
    );
    return;
  }
  // その他（JS/CSS等）はネットワーク優先、失敗したらキャッシュ
  e.respondWith(
    fetch(e.request).then(res=>{
      if(res.ok){
        const clone=res.clone();
        caches.open(CACHE).then(c=>c.put(e.request,clone));
      }
      return res;
    }).catch(()=>caches.match(e.request))
  );
});
`;

  const blob=new Blob([swCode],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url,{scope:'/'})
    .then(reg=>{
      // 新しいSWが待機中なら即適用
      reg.addEventListener('updatefound',()=>{
        const sw=reg.installing;
        sw.addEventListener('statechange',()=>{
          if(sw.state==='installed'&&navigator.serviceWorker.controller){
            sw.postMessage({type:'SKIP_WAITING'});
          }
        });
      });
    })
    .catch(e=>console.warn('SW register failed:',e));

  // オフライン/オンライン状態の通知
  function updateOnlineStatus(){
    const offline=!navigator.onLine;
    let bar=document.getElementById('offline-bar');
    if(offline){
      if(!bar){
        bar=document.createElement('div');
        bar.id='offline-bar';
        bar.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99998;background:#EF4444;color:#fff;text-align:center;font-size:11px;font-weight:700;padding:4px;';
        bar.textContent='📵 オフラインモード — データは自動保存されています';
        document.body.appendChild(bar);
      }
    } else {
      if(bar) bar.remove();
    }
  }
  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus();
}
</script>
